name: Reopen issues closed without milestone

on:
  issues:
    types: [closed]

jobs:
  reopen-if-no-milestone:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Check and reopen
        if: github.event.issue.milestone == null && github.event.issue.state_reason ==
          'completed'
        uses: actions/github-script@v7
        with:
          script: |
            const overrideKeyword = '/force';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              sort: 'created',
              direction: 'desc',
              per_page: 1
            });
            const latest = comments[0];
            const closedAt = new Date(context.payload.issue.closed_at).getTime();
            const commentedAt = latest ? new Date(latest.created_at).getTime() : 0;
            if (latest && latest.body && latest.body.includes(overrideKeyword)
                && Math.abs(commentedAt - closedAt) <= 60000) {
              core.info(`Override keyword "${overrideKeyword}" in comment posted with the close action, leaving issue closed.`);
              return;
            }
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'open'
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: 'Reopening — issues must have a milestone set before being closed as completed. Either assign a milestone, or close as "not planned" / "duplicate".'
            });
