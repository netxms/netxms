name: Build and run basic unit tests

on:
  push:
    branches:
      - master
      - stable-*
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  Build-and-Run-Tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Update apt cache
        run: sudo apt-get update
      - name: Install dependencies
        run: sudo apt-get install -y libpq-dev libcurl4-openssl-dev libssh-dev
          libmosquitto-dev libjq-dev libpcre3-dev libmicrohttpd-dev
          libargon2-dev libjansson-dev
      - name: Prepare release build
        run: ./build/prepare_release_build.sh
      - name: autoconf
        run: ./reconf
      - name: configure
        run: ./configure --prefix=/tmp/build --with-server --with-agent --with-pgsql
          --with-tests CXXFLAGS="-g -O2 -Wcast-function-type"
      - name: make
        run: |
          set -o pipefail
          make -j$(nproc) 2>&1 | tee build.log
      - name: Check for function pointer cast mismatches
        run: |
          if grep -q 'cast-function-type' build.log; then
            echo "::error::Cast between incompatible function types. Calling through such a"
            echo "::error::pointer is undefined behaviour - a mismatched return type works on"
            echo "::error::x86 by accident and breaks on SPARC. See issue #3445."
            grep -B2 'cast-function-type' build.log
            exit 1
          fi
      - name: make install
        run: make install
      - name: Run tests
        run: |
          /tmp/build/bin/netxmsd -v || true
          /tmp/build/bin/nxagentd -v || true
          /tmp/build/bin/netxms-test-suite
