      properties:
        id:
          type: integer
          description: Script ID
        name:
          type: string
          description: Script name
        code:
          type: string
          description: NXSL source code
    ObjectToolType:
      type: string
      enum:
        - internal
        - action
        - snmp-table
        - agent-list
        - url
        - command
        - server-command
        - file-download
        - server-script
        - agent-table
        - ssh-command
      description: Type of object tool
    ObjectToolInputField:
      type: object
      properties:
        name:
          type: string
          description: Field name
        type:
          type: integer
          description: Field type
        displayName:
          type: string
          description: Display name for the field
        defaultValue:
          type: string
          description: Default value for the field
        flags:
          type: integer
          description: Field flags
        sequence:
          type: integer
          description: Field sequence order
    ObjectToolSummary:
      type: object
      properties:
        id:
          type: integer
          description: Tool ID
        name:
          type: string
          description: Tool name
        type:
          $ref: '#/components/schemas/ObjectToolType'
        flags:
          type: object
          description: Tool flags
          properties:
            askConfirmation:
              type: boolean
              description: Whether to ask for user confirmation before execution
            generatesOutput:
              type: boolean
              description: Whether the tool generates output
            disabled:
              type: boolean
              description: Whether the tool is disabled
            showInCommands:
              type: boolean
              description: Whether to show in commands menu
            snmpIndexedByValue:
              type: boolean
              description: Whether SNMP is indexed by value
            runInContainerContext:
              type: boolean
              description: Whether to run in container context
            suppressSuccessMessage:
              type: boolean
              description: Whether to suppress success message
            setupTcpTunnel:
              type: boolean
              description: Whether to setup TCP tunnel
        confirmationMessage:
          type: string
          description: Confirmation message shown to user
        commandName:
          type: string
          description: Full command name
        commandShortName:
          type: string
          description: Short command name
        remotePort:
          type: integer
          description: Remote port for TCP tunnel
        remoteHost:
          type: string
          description: Remote host for TCP tunnel
        applicableClasses:
          type: integer
          description: |
            Bitmask of object classes the tool is applicable to.
            Bit 0 (1) = Node, bit 1 (2) = Interface, bit 2 (4) = Sensor,
            bit 3 (8) = Access point. Only server-script and URL tools
            may include bits other than Node.
        inputFields:
          type: array
          items:
            $ref: '#/components/schemas/ObjectToolInputField'
          description: Input field definitions
    ObjectToolColumn:
      type: object
      description: Column definition for table tools (snmp-table or agent-list)
      properties:
        name:
          type: string
          description: Column display name
        oid:
          type: string
          description: Column SNMP OID or agent column expression
        format:
          type: integer
          description: Column data format code
        captureGroup:
          type: integer
          description: Regex capture group number used to extract the cell value (0 for whole match)
    ObjectToolDetails:
      allOf:
        - $ref: '#/components/schemas/ObjectToolSummary'
        - type: object
          properties:
            data:
              type: string
              description: Tool-specific data
            description:
              type: string
              description: Tool description
            filter:
              type: string
              description: Tool filter (matching OID for SNMP tools)
            icon:
              type: string
              format: uuid
              description: UUID of the icon image in the image library; absent when no icon is set
            acl:
              type: array
              description: |
                User and group IDs allowed to execute this tool. Only present when the caller
                has SYSTEM_ACCESS_MANAGE_TOOLS rights.
              items:
                type: integer
            columns:
              type: array
              description: |
                Column definitions for table tools. Only present when the caller has
                SYSTEM_ACCESS_MANAGE_TOOLS rights and the tool type is snmp-table or agent-list.
              items:
                $ref: '#/components/schemas/ObjectToolColumn'
            translations:
              type: array
              description: |
                Localized string overrides for tool name, description, and input field labels.
                Only present when the caller has SYSTEM_ACCESS_MANAGE_TOOLS rights and at least
                one translation exists.
              items:
                $ref: '#/components/schemas/ObjectToolTranslation'
    ObjectToolWrite:
      type: object
      description: |
        Request body for creating or updating an object tool. The shape mirrors the
        ObjectToolDetails response, so a tool can be fetched, edited, and put back without
        translation. Whole-record replace semantics on PUT.
      required:
        - name
        - type
      properties:
        name:
          type: string
          description: Tool name
        type:
          $ref: '#/components/schemas/ObjectToolType'
        data:
          type: string
          description: Tool-specific data (command line, script name, URL template, etc.)
        description:
          type: string
        flags:
          type: object
          description: Tool flag booleans; missing keys default to false
          properties:
            askConfirmation:
              type: boolean
            generatesOutput:
              type: boolean
            disabled:
              type: boolean
            showInCommands:
              type: boolean
            snmpIndexedByValue:
              type: boolean
            runInContainerContext:
              type: boolean
            suppressSuccessMessage:
              type: boolean
            setupTcpTunnel:
              type: boolean
        filter:
          type: string
        confirmationMessage:
          type: string
        commandName:
          type: string
        commandShortName:
          type: string
        icon:
          type: string
          format: uuid
          description: UUID of an existing image library entry; omit or use null UUID for no icon
        remotePort:
          type: integer
        remoteHost:
          type: string
        applicableClasses:
          type: integer
          description: |
            Bitmask of applicable object classes. Bit 0 (1) = Node, bit 1 (2) = Interface,
            bit 2 (4) = Sensor, bit 3 (8) = Access point. Defaults are applied if 0 or missing:
            URL tools default to all classes, others to Node. Non-Node bits are stripped for
            tool types other than server-script, url and ssh-command.
        acl:
          type: array
          description: |
            User and group IDs allowed to execute this tool. Replaces the existing ACL on PUT.
            Send an empty array to remove all entries.
          items:
            type: integer
        columns:
          type: array
          description: Column definitions for snmp-table and agent-list tools. Ignored for other types.
          items:
            $ref: '#/components/schemas/ObjectToolColumn'
        inputFields:
          type: array
          items:
            $ref: '#/components/schemas/ObjectToolInputField'
        translations:
          type: array
          description: Localized string overrides for tool name, description, and input field labels. Replaces all existing translations on PUT.
          items:
            $ref: '#/components/schemas/ObjectToolTranslation'
    ObjectToolTranslation:
      type: object
      description: Single localized string override for an object tool.
      properties:
        field:
          type: string
          description: Tag identifying which string is translated (e.g. tool name, description, or an input field label)
        language:
          type: string
          description: Language code the translation applies to
        value:
          type: string
          description: Translated string value
    ObjectToolTextResult:
      type: object
      required:
        - type
        - output
      properties:
        type:
          type: string
          enum: [text]
        output:
          type: string
          description: Text output from tool execution (agent action output, server command output, or script output with result)
    ObjectToolTableResult:
      type: object
      required:
        - type
        - table
      properties:
        type:
          type: string
          enum: [table]
        table:
          type: object
          description: Table result from SNMP table, agent table, or agent list tool execution
          properties:
            extendedFormat:
              type: boolean
            source:
              type: integer
            title:
              type: string
              description: Table title
            columns:
              type: array
              items:
                type: object
                properties:
                  name:
                    type: string
                    description: Column name
                  dataType:
                    type: integer
                    description: Column data type code
                  displayName:
                    type: string
                    description: Column display name
                  instanceColumn:
                    type: boolean
                  unitName:
                    type: string
                  multiplier:
                    type: integer
                  useMultiplier:
                    type: integer
            data:
              type: array
              items:
                type: object
                properties:
                  objectId:
                    type: integer
                  baseRow:
                    type: integer
                  values:
                    type: array
                    items:
                      type: object
                      properties:
                        status:
                          type: integer
                          description: Cell status code
                        value:
                          type: string
                          description: Cell value
    ObjectToolNoResult:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum: [none]
          description: Indicates tool executed successfully but produced no output
    ObjectToolUrlResult:
      type: object
      required:
        - type
        - url
      properties:
        type:
          type: string
          enum: [url]
        url:
          type: string
          description: Expanded URL with all macros resolved
    ObjectToolStreamingResult:
      type: object
      required:
        - token
        - wsUrl
      properties:
        token:
          type: string
          format: uuid
          description: Single-use token for WebSocket connection (expires in 30 seconds)
        wsUrl:
          type: string
          description: WebSocket URL path to connect for streaming output
    ObjectClass:
      type: string
      enum:
        - AccessPoint
        - AgentPolicyLogParser
        - Asset
        - AssetGroup
        - AssetRoot
        - BusinessService
        - BusinessServiceProto
        - BusinessServiceRoot
        - Chassis
        - Cluster
        - Condition
        - Container
        - Dashboard
        - DashboardGroup
        - DashboardRoot
        - Generic
        - Interface
        - MobileDevice
        - Network
        - NetworkMap
        - NetworkMapGroup
        - NetworkMapRoot
        - NetworkService
        - Node
        - NodeLink
        - Rack
        - Report
        - ReportGroup
        - ReportRoot
        - Sensor
        - ServiceCheck
        - ServiceRoot
        - Subnet
        - Template
        - TemplateGroup
        - TemplateRoot
        - VPNConnector
        - Zone
    GrafanaAlarm:
      type: object
      properties:
        Id:
          type: integer
          description: Alarm ID
        Severity:
          type: string
          description: Alarm severity name (Normal, Warning, Minor, Major, Critical, etc.)
        State:
          type: string
          description: Alarm state name (Outstanding, Acknowledged, Resolved, Terminated)
        Source:
          type: string
          description: Source object name (may include alias in parentheses)
        Message:
          type: string
          description: Alarm message
        Count:
          type: integer
          description: Alarm repeat count
        Ack/Resolve by:
          type: string
          description: User who acknowledged/resolved the alarm
        Created:
          type: string
          format: date-time
          description: Alarm creation time
        Last Change:
          type: string
          format: date-time
          description: Last change time of the alarm
    ObjectUrl:
      type: object
      properties:
        id:
          type: integer
          description: URL ID (assigned by the server)
        url:
          type: string
          description: The URL
        description:
          type: string
          description: Human-readable description
    RackPassiveElement:
      type: object
      description: A passive rack element (patch panel, filler panel, organiser, or PDU). On create/update only the writable fields are read; the element type is immutable after creation.
      properties:
        id:
          type: integer
          description: Element ID (assigned by the server; ignored on input).
          readOnly: true
        name:
          type: string
          description: Element name.
        type:
          type: integer
          description: Element type (0=patch panel, 1=filler panel, 2=organiser, 3=PDU). Immutable on update.
        position:
          type: integer
          description: Position in rack units.
        height:
          type: integer
          description: Height in rack units.
        orientation:
          type: integer
          description: Orientation (0=fill, 1=front, 2=rear).
        portCount:
          type: integer
          description: Number of ports (patch panels only).
        imageFront:
          type: string
          format: uuid
          description: Front image UUID from the image library.
        imageRear:
          type: string
          format: uuid
          description: Rear image UUID from the image library.
    DashboardElement:
      type: object
      description: A single dashboard element (widget). Element type-specific configuration lives in the free-form `data` object; positioning lives in `layout`.
      properties:
        guid:
          type: string
          format: uuid
          description: Element GUID. Assigned by the server when omitted on input.
        type:
          type: integer
          description: Element type code.
        data:
          type: object
          description: Element configuration (type-specific free-form object).
        layout:
          type: object
          description: Element layout / placement (free-form object).
      required:
        - type
    DashboardContent:
      type: object
      description: Content of a dashboard or dashboard template object - column count, display priority, and element layout.
      properties:
        numColumns:
          type: integer
          description: Number of layout columns.
        displayPriority:
          type: integer
          description: Display ordering priority (plain dashboards only; ignored for templates).
        forcedContextObjectId:
          type: integer
          description: Forced context object ID for dashboards created from a template (plain dashboards only; ignored for templates).
        elements:
          type: array
          description: Dashboard elements. On update this is a full replacement of the element layout.
          items:
            $ref: '#/components/schemas/DashboardElement'
    NetworkMapElement:
      type: object
      description: A single network map element (object reference, decoration, DCI container/image, or text box). Element type-specific fields are carried alongside the common ones.
      properties:
        id:
          type: integer
          description: Element ID (unique within the map).
        type:
          type: integer
          description: Element type code (e.g. object, decoration, DCI container, DCI image, text box).
        posX:
          type: integer
          description: X position.
        posY:
          type: integer
          description: Y position.
        flags:
          type: integer
          description: Element flags.
      required:
        - type
    NetworkMapLink:
      type: object
      description: A single network map link between two elements. Link IDs are assigned by the server on save.
      properties:
        element1:
          type: integer
          description: ID of the first linked element.
        element2:
          type: integer
          description: ID of the second linked element.
        interface1:
          type: integer
          description: Object ID of the interface at the first endpoint (0 if none).
        interface2:
          type: integer
          description: Object ID of the interface at the second endpoint (0 if none).
        type:
          type: integer
          description: Link type code.
        name:
          type: string
          description: Link label.
        connectorName1:
          type: string
          description: Connector label at the first endpoint.
        connectorName2:
          type: string
          description: Connector label at the second endpoint.
        flags:
          type: integer
          description: Link flags.
        colorSource:
          type: integer
          description: Link color source.
        color:
          type: integer
          description: Fixed link color (used when color source is "custom color").
        colorProvider:
          type: string
          description: Name of the script providing the link color (used when color source is "script").
        config:
          type: string
          description: Serialized JSON link configuration (e.g. referenced DCI list).
    NetworkMapContent:
      type: object
      description: Content of a network map object - layout settings, link defaults, background, and element/link layout.
      properties:
        mapType:
          type: integer
          description: Map type (custom, layer-2 topology, IP topology, etc.).
        layout:
          type: integer
          description: Automatic layout algorithm.
        flags:
          description: |
            Map behavior/appearance flags. Returned as an object of booleans. On update
            it may be supplied either as such an object (only the keys present are changed;
            omitted keys are left unchanged) or, as a shortcut, as an integer bit mask that
            replaces the whole flag word.
          oneOf:
            - type: object
              additionalProperties:
                type: boolean
              properties:
                showStatusIcon: { type: boolean }
                showStatusFrame: { type: boolean }
                showStatusBackground: { type: boolean }
                showEndNodes: { type: boolean }
                calculateStatus: { type: boolean }
                filterObjects: { type: boolean }
                showLinkDirection: { type: boolean }
                useL1Topology: { type: boolean }
                centerBackgroundImage: { type: boolean }
                translucentLabelBackground: { type: boolean }
                dontUpdateLinkText: { type: boolean }
                fitBackgroundImage: { type: boolean }
                fitToScreen: { type: boolean }
                showAsObjectView: { type: boolean }
                showTraffic: { type: boolean }
                showWifiClients: { type: boolean }
            - type: integer
              description: Raw flag bit mask (replaces the whole flag word).
        seedObjects:
          type: array
          description: Seed object IDs for topology maps.
          items:
            type: integer
        discoveryRadius:
          type: integer
          description: Topology discovery radius (hops from seed).
        defaultLinkColor:
          type: integer
          description: Default link color.
        defaultLinkColorSource:
          type: integer
          description: Default link color source.
        defaultLinkRouting:
          type: integer
          description: Default link routing algorithm.
        defaultLinkWidth:
          type: integer
          description: Default link width.
        defaultLinkStyle:
          type: integer
          description: Default link style.
        objectDisplayMode:
          type: integer
          description: Object element display mode.
        backgroundColor:
          type: integer
          description: Map background color.
        background:
          type: string
          format: uuid
          description: Background image UUID (or a special value for map/none). When set, the background geo-positioning fields below apply.
        backgroundLatitude:
          type: number
          description: Background map center latitude.
        backgroundLongitude:
          type: number
          description: Background map center longitude.
        backgroundZoom:
          type: integer
          description: Background map zoom level.
        filter:
          type: string
          description: NXSL object filter script source.
        linkScript:
          type: string
          description: NXSL link styling script source.
        width:
          type: integer
          description: Map canvas width.
        height:
          type: integer
          description: Map canvas height.
        canvasType:
          type: integer
          description: Map canvas type.
        initialViewMode:
          type: integer
          description: Initial view mode when the map is opened.
        displayPriority:
          type: integer
          description: Display ordering priority.
        elements:
          type: array
          description: Map elements. On update this fully replaces the element layout.
          items:
            $ref: '#/components/schemas/NetworkMapElement'
        links:
          type: array
          description: Map links. On update this fully replaces the link layout.
          items:
            $ref: '#/components/schemas/NetworkMapLink'
    ObjectAccessRights:
      type: object
      description: Object access control list and the flag controlling inheritance of access rights from parent objects.
      properties:
        inheritAccessRights:
          type: boolean
          description: When true, effective rights include those inherited from parent objects in addition to the directly assigned rights below.
        accessList:
          type: array
          description: Directly assigned access control entries. On update this is a full replacement of the object's own access list.
          items:
            type: object
            properties:
              userId:
                type: integer
                description: User or group ID. Group IDs have the high bit (0x80000000) set.
              access:
                type: integer
                description: Bit mask of access rights granted to the user or group on this object.
    CustomAttribute:
      type: object
      description: A single custom attribute as embedded in an object document and returned by the custom-attributes sub-resource.
      properties:
        name:
          type: string
          description: Attribute name.
        value:
          type: string
          description: Attribute value.
        flags:
          type: object
          description: Attribute flags as named booleans.
          properties:
            inheritable:
              type: boolean
              description: Attribute is inherited by child objects.
            redefined:
              type: boolean
              description: Inherited attribute is redefined on this object.
            conflict:
              type: boolean
              description: Attribute is inherited from multiple parents with differing values.
        sourceObject:
          type: integer
          description: ID of the object an inherited attribute originates from; 0 if defined directly on this object.
    PollingConfig:
      type: object
      additionalProperties: false
      description: |
        Polling property group for a node. Returned by GET /v1/objects/{id}/polling and
        embedded as `ObjectDetails.polling`; accepted by PATCH /v1/objects/{id}/polling with
        merge-patch semantics (omitted fields are left unchanged). Within the `flags` object
        only the named booleans that are present are modified; the rest are preserved.
      properties:
        pollerNode:
          type: integer
          description: ID of the node used for polling, or 0 to poll from the server. Must reference a node object.
        requiredPollCount:
          type: integer
          description: Number of consecutive polls required before a status change is registered.
        expectedCapabilities:
          type: integer
          description: Expected capabilities bitmask.
        useIfXTable:
          type: integer
          description: Whether to use SNMP ifXTable for interface polling (0 = server default, 1 = enabled, 2 = disabled).
        flags:
          type: object
          additionalProperties: false
          description: Poll-type and per-protocol disable flags. Only present keys are changed.
          properties:
            disableAgent:
              type: boolean
              description: Disable usage of NetXMS agent for all polls.
            disableSNMP:
              type: boolean
              description: Disable usage of SNMP for all polls.
            disableICMP:
              type: boolean
              description: Disable usage of ICMP pings for status polling.
            disableSSH:
              type: boolean
              description: Disable SSH usage for all polls.
            disableVNC:
              type: boolean
              description: Disable VNC detection.
            disableSMCLPProperties:
              type: boolean
              description: Disable reading of SM-CLP available properties metadata.
            disableEtherNetIP:
              type: boolean
              description: Disable usage of EtherNet/IP for all polls.
            disableModbus:
              type: boolean
              description: Disable usage of Modbus for all polls.
            disable8021xStatusPoll:
              type: boolean
              description: Disable 802.1x port state checking during status poll.
            disableRoutePoll:
              type: boolean
              description: Disable routing table polling.
            disableTopologyPoll:
              type: boolean
              description: Disable topology polling.
            disableDiscoveryPoll:
              type: boolean
              description: Disable network discovery polling.
            disablePerfCount:
              type: boolean
              description: Disable reading of Windows performance counters metadata.
            disableStatusPoll:
              type: boolean
              description: Disable status polling.
            disableConfigurationPoll:
              type: boolean
              description: Disable configuration polling.
            disableDataCollection:
              type: boolean
              description: Disable data collection.
    SnmpConfig:
      type: object
      additionalProperties: false
      description: |
        SNMP communication property group for a node. Returned by GET /v1/objects/{id}/snmp
        and embedded as `ObjectDetails.snmp`; accepted by PATCH /v1/objects/{id}/snmp with
        merge-patch semantics (omitted fields are left unchanged).
      properties:
        version:
          type: string
          enum: ['1', '2c', '3', default]
          description: SNMP protocol version used for polling. Clamped up to the server minimum SNMP version.
        port:
          type: integer
          description: SNMP UDP port.
        proxy:
          type: integer
          nullable: true
          description: ID of the node used as SNMP proxy, or 0 for no proxy.
        codepage:
          type: string
          nullable: true
          description: Codepage used to decode SNMP string values (empty for server default).
        settingsLocked:
          type: boolean
          description: Prevent automatic SNMP configuration changes by configuration polls.
        authName:
          type: string
          nullable: true
          description: Community string for SNMP v1/v2c, or USM user name for SNMP v3.
        authMethod:
          type: string
          enum: [NONE, MD5, SHA1, SHA224, SHA256, SHA384, SHA512]
          description: SNMP v3 authentication method.
        authPassword:
          type: string
          nullable: true
          description: SNMP v3 authentication password (write-only).
        privMethod:
          type: string
          enum: [NONE, DES, AES-128, AES-192, AES-256]
          description: SNMP v3 privacy (encryption) method.
        privPassword:
          type: string
          nullable: true
          description: SNMP v3 privacy password (write-only).
        contextName:
          type: string
          nullable: true
          description: SNMP v3 context name.
        trap:
          nullable: true
          description: Separate credentials for received SNMP traps. An object fully replaces them; null reverts to using the polling credentials.
          allOf:
            - $ref: '#/components/schemas/SnmpTrapCredentials'
    SnmpTrapCredentials:
      type: object
      additionalProperties: false
      description: |
        Separate SNMP trap reception credentials. Merge-patched onto the existing trap
        credentials; omitted fields are left unchanged. When the trap credentials are being
        created (none existed before) the version defaults to 2c.
      properties:
        version:
          type: string
          enum: ['1', '2c', '3']
          description: SNMP version of the expected traps.
        authName:
          type: string
          description: Trap community string (v1/v2c) or USM user name (v3).
        authMethod:
          type: string
          enum: [NONE, MD5, SHA1, SHA224, SHA256, SHA384, SHA512]
          description: SNMP v3 authentication method for traps.
        authPassword:
          type: string
          nullable: true
          description: SNMP v3 trap authentication password (write-only).
        privMethod:
          type: string
          enum: [NONE, DES, AES-128, AES-192, AES-256]
          description: SNMP v3 privacy method for traps.
        privPassword:
          type: string
          nullable: true
          description: SNMP v3 trap privacy password (write-only).
    AgentConfig:
      type: object
      additionalProperties: false
      description: |
        NetXMS agent communication property group for a node. Returned by GET
        /v1/objects/{id}/agent and embedded as `ObjectDetails.agent`; accepted by PATCH
        /v1/objects/{id}/agent with merge-patch semantics (omitted fields are left unchanged).
      properties:
        port:
          type: integer
          description: Agent TCP port.
        proxy:
          type: integer
          nullable: true
          description: ID of the node used as agent proxy, or 0 for no proxy.
        sharedSecret:
          type: string
          nullable: true
          description: Agent shared secret (write-only).
        forceEncryption:
          type: boolean
          description: Require encryption for agent communication.
        tunnelOnly:
          type: boolean
          description: Accept agent connections only through an established agent tunnel.
        cacheMode:
          type: string
          enum: [default, on, off]
          description: Agent-side DCI value caching mode.
        compressionMode:
          type: string
          enum: [default, enabled, disabled]
          description: Agent communication protocol compression mode.
        certificateMappingMethod:
          type: string
          enum: [subject, publicKey, commonName, templateId]
          description: Method used to map the agent's certificate to this node for authentication.
        certificateMappingData:
          type: string
          nullable: true
          description: Certificate mapping data (interpretation depends on certificateMappingMethod).
    ObjectCreationRequest:
      type: object
      required:
        - class
        - name
      description: |
        Object creation document. Common fields apply to every class; the remaining fields are
        only meaningful for the class indicated by `class` (and are ignored otherwise). Any
        common scalar property accepted by `PATCH /v1/objects/{object-id}` may also be supplied
        and is applied to the new object after construction.
      properties:
        class:
          type: string
          description: Symbolic object class name.
          enum:
            - Subnet
            - Node
            - Interface
            - Container
            - Zone
            - Template
            - TemplateGroup
            - NetworkService
            - VPNConnector
            - Condition
            - Cluster
            - BusinessServiceProto
            - Asset
            - AssetGroup
            - NetworkMapGroup
            - NetworkMap
            - Dashboard
            - DashboardTemplate
            - DashboardGroup
            - BusinessService
            - Collector
            - Circuit
            - MobileDevice
            - Rack
            - WirelessDomain
            - Chassis
            - Sensor
            - CloudDomain
        name:
          type: string
          description: Object name.
        parentId:
          type: integer
          description: Parent object ID. Required for all classes except Node (where a parent subnet is resolved automatically from the IP address when omitted).
        zoneUIN:
          type: integer
          description: Zone UIN (when zoning is enabled).
        comments:
          type: string
          description: Free-form object comments.
        alias:
          type: string
          description: Object alias.
        assetId:
          type: integer
          description: Optional ID of an existing asset object to link to the new object.
        # --- Node ---
        primaryName:
          type: string
          description: (Node) Primary host name. If present it is resolved to the primary IP address.
        ipAddress:
          type: string
          description: (Node/Interface/Subnet) IP address. For a node it is the primary IP address used when no primary name is given.
        ipNetMask:
          type: integer
          description: (Node) Network mask length in bits for the primary IP address.
        creationFlags:
          type: integer
          description: (Node) Bit mask controlling node creation (disable polling protocols, create unmanaged, etc.).
        agentPort:
          type: integer
        snmpPort:
          type: integer
        etherNetIpPort:
          type: integer
        etherNetIpAddress:
          type: string
        modbusTcpPort:
          type: integer
        modbusUnitId:
          type: integer
          description: (Node/Sensor) Modbus unit ID.
        sshLogin:
          type: string
        sshPassword:
          type: string
        sshPort:
          type: integer
        vncPassword:
          type: string
        vncPort:
          type: integer
        agentProxy:
          type: integer
        snmpProxy:
          type: integer
        mqttProxy:
          type: integer
        modbusProxy:
          type: integer
        etherNetIpProxy:
          type: integer
        icmpProxy:
          type: integer
        sshProxy:
          type: integer
        vncProxy:
          type: integer
        webServiceProxy:
          type: integer
        # --- Interface ---
        ifIndex:
          type: integer
          description: (Interface) Interface index.
        ifType:
          type: integer
          description: (Interface) Interface type (IANA ifType).
        macAddress:
          type: string
          description: (Interface/Sensor) MAC address.
        chassis:
          type: integer
          description: (Interface) Physical chassis number.
        module:
          type: integer
          description: (Interface) Physical module number.
        pic:
          type: integer
          description: (Interface) Physical PIC number.
        port:
          type: integer
          description: (Interface) Physical port number.
        physicalPort:
          type: boolean
          description: (Interface) Whether the interface is a physical port.
        # --- Network service ---
        serviceType:
          type: integer
          description: (NetworkService) Service type.
        ipProtocol:
          type: integer
          description: (NetworkService) IP protocol number (default 6/TCP).
        ipPort:
          type: integer
          description: (NetworkService) Port number.
        request:
          type: string
          description: (NetworkService) Request string sent to the service.
        response:
          type: string
          description: (NetworkService) Expected response string.
        createStatusDci:
          type: boolean
          description: (NetworkService) Create a status DCI on the parent node.
        # --- Network map ---
        mapType:
          type: integer
          description: (NetworkMap) Map type.
        mapCanvasType:
          type: integer
          description: (NetworkMap) Canvas rendering type.
        seedObjects:
          type: array
          items:
            type: integer
          description: (NetworkMap) Seed object IDs.
        # --- Other class-specific fields ---
        controllerId:
          type: integer
          description: (Chassis) Controller node ID.
        height:
          type: integer
          description: (Rack) Rack height in units.
        deviceId:
          type: string
          description: (MobileDevice) Device identifier.
        instanceDiscoveryMethod:
          type: integer
          description: (BusinessServiceProto) Instance discovery method.
        flags:
          type: integer
          description: (Sensor) Sensor flags.
        deviceClass:
          type: integer
          description: (Sensor) Sensor device class.
        vendor:
          type: string
          description: (Sensor) Vendor name.
        model:
          type: string
          description: (Sensor) Model.
        serialNumber:
          type: string
          description: (Sensor) Serial number.
        deviceAddress:
          type: string
          description: (Sensor) Device address.
        gatewayNode:
          type: integer
          description: (Sensor) Gateway node ID.
        connectorName:
          type: string
          description: (CloudDomain) Cloud connector name.
        credentials:
          oneOf:
            - type: string
            - type: object
          description: (CloudDomain) Cloud credentials as a JSON object or raw JSON string.
        discoveryFilter:
          type: string
          description: (CloudDomain) Resource discovery filter.
        removalPolicy:
          type: integer
          description: (CloudDomain) Resource removal policy.
        gracePeriod:
          type: integer
          description: (CloudDomain) Grace period in seconds before removing vanished resources.
        assetProperties:
          type: object
          additionalProperties:
            type: string
          description: (Asset) Asset attribute values keyed by attribute name. All mandatory attributes must be present.
        linkedObjectId:
          type: integer
          description: (Asset) Optional ID of an existing object to link the new asset to. Server will update asset identification (serial number or MAC address) from that object and run auto fill scripts after linking. Requires modify access to that object.
    ObjectDetails:
      type: object
      properties:
        alias:
          type: string
          description: Object alias
        category:
          type: integer
          description: Object category ID
        chassisPlacementConfig:
          allOf:
            - $ref: '#/components/schemas/ChassisPlacement'
          description: Placement geometry within the parent chassis. Present only for nodes placed in a chassis.
        class:
          $ref: '#/components/schemas/ObjectClass'
        customAttributes:
          type: array
          description: Custom attributes defined on the object (including those inherited from parent objects).
          items:
            $ref: '#/components/schemas/CustomAttribute'
        guid:
          type: string
          format: uuid
          description: Object GUID
        id:
          type: integer
          description: Object ID
        name:
          type: string
          description: Object name
        responsibleUsers:
          type: array
          description: Users or groups responsible for the object (the object's own list; entries inherited from parent objects are not included).
          items:
            type: object
            properties:
              userId:
                type: integer
                description: User or group ID
              tag:
                type: string
                description: Responsible user tag
        timestamp:
          type: string
          format: date-time
          description: Object last change timestamp
        status:
          $ref: '#/components/schemas/Status'
        pollStates:
          type: array
          description: Per-poll-type state. Present only for pollable objects (e.g. nodes, sensors, interfaces); one entry per poll type the object accepts.
          items:
            $ref: '#/components/schemas/PollState'
    PollState:
      type: object
      description: State of a single poll type on a pollable object.
      properties:
        name:
          type: string
          description: Poll type name (e.g. "status", "configuration", "instance", "discovery", "topology", "routing-table", "icmp", "autobind", "map-update").
        pending:
          type: boolean
          description: True if a poll of this type is currently queued or in flight.
        lastCompleted:
          type: string
          format: date-time
          nullable: true
          description: Timestamp of the most recent successful completion, or null if this poll type has never completed since server start.
        timer:
          type: object
          description: Poll duration statistics in milliseconds. Omitted when the poll type has never completed (lastCompleted is null).
          properties:
            last:
              type: integer
              description: Duration of the most recent completed poll (ms).
            average:
              type: integer
              description: Rolling average poll duration (ms).
            min:
              type: integer
              description: Minimum observed poll duration (ms).
            max:
              type: integer
              description: Maximum observed poll duration (ms).
    TopologyMap:
      type: object
      description: Ad-hoc topology map containing discovered objects and the links between them
      properties:
        objects:
          type: array
          description: List of objects in the topology
          items:
            $ref: '#/components/schemas/ObjectSummary'
        links:
          type: array
          description: Links between objects
          items:
            $ref: '#/components/schemas/TopologyLink'
    TopologyLink:
      type: object
      description: A link between two objects in a topology map
      properties:
        object1:
          type: integer
          description: First object ID
        object2:
          type: integer
          description: Second object ID
        interface1:
          type: integer
          description: Interface ID on first object (0 if not applicable)
        interface2:
          type: integer
          description: Interface ID on second object (0 if not applicable)
        type:
          type: integer
          description: "Link type (0=normal, 1=VPN, 2=multilink, 3=agent tunnel, 4=agent proxy, 5=SSH proxy, 6=SNMP proxy, 7=ICMP proxy, 8=sensor proxy, 9=zone proxy, 10=WiFi client)"
        name:
          type: string
          description: Link name
        port1:
          type: string
          description: Port/connector name on first object
        port2:
          type: string
          description: Port/connector name on second object
        flags:
          type: integer
          description: Link flags
    ObjectQueryResult:
      type: object
      properties:
        fields:
          type: object
          additionalProperties:
            type: string
            description: Set of key-value pairs where key is object attribute name and value is actual value read from object.
        object:
          $ref: '#/components/schemas/ObjectSummary'
    ObjectSummary:
      type: object
      properties:
        alias:
          type: string
          description: Object alias
        category:
          type: integer
          description: Object category ID
        class:
          $ref: '#/components/schemas/ObjectClass'
        guid:
          type: string
          format: uuid
          description: Object GUID
        id:
          type: integer
          description: Object ID
        ipAddress:
          $ref: '#/components/schemas/InetAddress'
        isInMaintenanceMode:
          type: boolean
          description: true if object is in maintenance mode
        isMaintenanceApplicable:
          type: boolean
          description: true if object can be placed into maintenance mode
        name:
          type: string
          description: Object name
        timestamp:
          type: string
          format: date-time
          description: Object last change timestamp
        status:
          $ref: '#/components/schemas/Status'
    ObjectTreeNode:
      description: Object summary with recursively nested child objects. The `children` property is present only when the object has at least one accessible child matching the request filter.
      allOf:
        - $ref: '#/components/schemas/ObjectSummary'
        - type: object
          properties:
            children:
              type: array
              description: Nested child objects (recursive)
              items:
                $ref: '#/components/schemas/ObjectTreeNode'
    Status:
      type: integer
      enum:
        - 0
        - 1
        - 2
        - 3
        - 4
        - 5
        - 6
        - 7
        - 8
    DataCollectionItem:
      type: object
      description: |
        Data collection item (DCI) definition. Covers both single-value items (`type: item`) and
        table DCIs (`type: table`). Enumeration properties are represented as symbolic names on
        output and accept either a symbolic name or the raw numeric code on input. Properties marked
        read-only are ignored in create/update requests.
      properties:
        id:
          type: integer
          readOnly: true
          description: DCI ID (assigned by the server)
        guid:
          type: string
          format: uuid
          readOnly: true
          description: Globally unique DCI identifier
        type:
          type: string
          enum: [item, table]
          default: item
          description: DCI type. Selected at creation; cannot be changed afterwards.
        name:
          type: string
          description: Metric/parameter name (required on create)
        description:
          type: string
          description: Human-readable DCI description
        origin:
          type: string
          enum: [internal, nxagent, snmp, websvc, push, winperf, smclp, script, ssh, mqtt, driver, modbus, ethernetip, cloud, otlp]
          description: Data origin
        status:
          type: string
          enum: [active, disabled, unsupported]
          description: DCI status
        dataType:
          type: string
          enum: [int32, uint32, int64, uint64, string, float, "null", counter32, counter64]
          description: Data type (single-value DCI only)
        transformedDataType:
          type: string
          enum: [int32, uint32, int64, uint64, string, float, "null", counter32, counter64]
          description: Data type after transformation (single-value DCI only)
        deltaCalculation:
          type: string
          enum: [none, simple, averagePerSecond, averagePerMinute]
          description: Delta calculation method (single-value DCI only)
        pollingScheduleType:
          type: string
          enum: [default, custom, advanced]
          description: Polling schedule type
        pollingInterval:
          type: string
          description: Polling interval expression (used when pollingScheduleType is custom)
        retentionType:
          type: string
          enum: [default, custom, none]
          description: Data retention type
        retentionTime:
          type: string
          description: Retention time expression (used when retentionType is custom)
        systemTag:
          type: string
        userTag:
          type: string
        comments:
          type: string
        transformationScript:
          type: string
          description: NXSL transformation script source
        sourceNode:
          type: integer
          description: Source (proxy) node ID, or 0 to disable
        snmpPort:
          type: integer
        snmpVersion:
          type: integer
        snmpContext:
          type: string
        snmpRawValueType:
          type: string
          enum: [none, int32, uint32, int64, uint64, double, ipAddr, macAddr, ip6Addr]
          description: SNMP raw value interpretation (single-value DCI only)
        multiplier:
          type: integer
        unitName:
          type: string
        mappingTableId:
          type: integer
        sampleCount:
          type: integer
        predictionEngine:
          type: string
        allThresholdsRearmEvent:
          type: integer
        aiHint:
          type: string
        aggregationDisabled:
          type: boolean
        hourlyRetention:
          type: integer
        dailyRetention:
          type: integer
        instanceDiscoveryMethod:
          type: string
          enum: [none, agentList, agentTable, snmpWalkValues, snmpWalkOids, script, winperf, webService, internalTable, smclpTargets, smclpProperties, push, otlp]
        instanceDiscoveryData:
          type: string
        instanceFilter:
          type: string
          description: NXSL instance filter script source
        instanceName:
          type: string
        instanceRetentionTime:
          type: integer
        perfTabSettings:
          type: string
        accessList:
          type: array
          description: Per-DCI access list (user/group IDs)
          items:
            type: integer
        thresholds:
          type: array
          description: Thresholds. When present in a request, replaces the whole set.
          items:
            $ref: '#/components/schemas/DciThreshold'
        columns:
          type: array
          description: Table columns (table DCI only). When present in a request, replaces the whole set.
          items:
            $ref: '#/components/schemas/DciTableColumn'
        templateId:
          type: integer
          readOnly: true
        templateItemId:
          type: integer
          readOnly: true
    DciThreshold:
      type: object
      description: Threshold definition for a single-value DCI
      properties:
        id:
          type: integer
          description: Threshold ID (0 or omitted for a new threshold; supply the existing id to preserve runtime state on update)
        activationEvent:
          type: string
          description: Event generated when the threshold is reached
        deactivationEvent:
          type: string
          description: Event generated when the threshold is rearmed
        function:
          type: string
          enum: [last, average, meanDeviation, diff, error, sum, script, absoluteDeviation, anomaly]
        condition:
          type: string
          enum: [less, lessOrEqual, equal, greaterOrEqual, greater, notEqual, like, notLike, iLike, iNotLike]
        value:
          type: string
        sampleCount:
          type: integer
        deactivationSampleCount:
          type: integer
        repeatInterval:
          type: integer
        regenerateOnValueChange:
          type: boolean
        disabled:
          type: boolean
        script:
          type: string
    DciTableColumn:
      type: object
      description: Column definition for a table DCI
      properties:
        name:
          type: string
        displayName:
          type: string
        snmpOid:
          type: string
        dataType:
          type: string
          enum: [int32, uint32, int64, uint64, string, float, "null", counter32, counter64]
        aggregationFunction:
          type: string
          enum: [last, min, max, average, sum]
        instanceColumn:
          type: boolean
        convertSnmpStringToHex:
          type: boolean
    DCIValue:
      type: object
      description: Data Collection Item (DCI) current value
      properties:
        ownerId:
          type: integer
          description: Object ID that owns this DCI
        id:
          type: integer
          description: DCI ID
        name:
          type: string
          description: DCI name
        flags:
          type: integer
          description: DCI flags
        description:
          type: string
          description: DCI description
        sourceType:
          type: integer
          description: Data source type
        dataType:
          type: integer
          description: Data type
        value:
          type: string
          description: Current value as string
        timestamp:
          type: integer
          description: Timestamp of last value collection (Unix timestamp)
        status:
          type: integer
          description: Current DCI status
        type:
          type: integer
          description: DCI type
        errorCount:
          type: integer
          description: Number of consecutive collection errors
        templateItemId:
          type: integer
          description: Template item ID if DCI is created from template
        unitName:
          type: string
          description: Unit name for the value
        multiplier:
          type: integer
          description: Value multiplier
        noValue:
          type: boolean
          description: True if DCI has no collected value
        comments:
          type: string
          description: DCI comments
        anomalyDetected:
          type: boolean
          description: True if anomaly was detected in recent values
        userTag:
          type: string
          description: User-defined tag
        hasActiveThreshold:
          type: boolean
          description: True if DCI has active threshold
        threshold:
          type: object
          description: Active threshold information (present only if hasActiveThreshold is true)
    TcpProxyConnectedMessage:
      type: object
      description: WebSocket text message sent when TCP proxy connection is established
      properties:
        type:
          type: string
          enum: [connected]
        channelId:
          type: integer
          description: Channel ID for the established TCP proxy connection
    TcpProxyErrorMessage:
      type: object
      description: WebSocket text message sent when an error occurs
      properties:
        type:
          type: string
          enum: [error]
        code:
          type: integer
          description: |
            Error code (RCC - Request Completion Code):
            - 0: Success
            - 1: Component locked
            - 2: Access denied
            - 3: Invalid request
            - 4: Request timeout
            - 5: Access denied
            - 7: Communication failure
            - 8: Invalid object ID
        message:
          type: string
          description: Human-readable error message
    TcpProxyCloseMessage:
      type: object
      description: WebSocket text message sent when the TCP proxy connection is closed
      properties:
        type:
          type: string
          enum: [close]
        reason:
          type: string
          enum: [normal, error, agent_disconnect]
          description: |
            Reason for connection closure:
            - normal: Connection closed normally by remote end
            - error: Connection closed due to an error
            - agent_disconnect: Agent connection was lost
    ServerAction:
      type: object
      description: Server action configuration
      properties:
        id:
          type: integer
          description: Action ID
        guid:
          type: string
          format: uuid
          description: Action GUID
        name:
          type: string
          description: Action name
        type:
          type: integer
          description: "Action type: 0=execute command on server, 1=execute command on remote node via agent, 3=send notification, 4=forward event, 5=execute server-side script, 7=execute command via SSH"
        typeDescription:
          type: string
          description: Human-readable action type description
        isDisabled:
          type: boolean
          description: Whether the action is disabled
        recipientAddress:
          type: string
          description: Recipient address (supports macros)
        emailSubject:
          type: string
          description: Email subject (supports macros)
        notificationChannelName:
          type: string
          description: Notification channel name
        command:
          type: string
          description: Action payload for command-type actions (type 0, 1, or 7). Exactly one of command/message/scriptName/data is present, selected by the action type.
        message:
          type: string
          description: Action payload for notification actions (type 3).
        scriptName:
          type: string
          description: Action payload for script actions (type 5).
        data:
          type: string
          description: Action payload for other action types (e.g. type 4, forward event).
    ServerActionCreate:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: Action name
        type:
          type: integer
          description: Action type
        isDisabled:
          type: boolean
          description: Whether the action is disabled
        data:
          type: string
          description: Action data (command, message, or script name depending on type)
        recipientAddress:
          type: string
          description: Recipient address
        emailSubject:
          type: string
          description: Email subject
        notificationChannelName:
          type: string
          description: Notification channel name
    ServerActionUpdate:
      type: object
      properties:
        name:
          type: string
          description: Action name
        type:
          type: integer
          description: Action type
        isDisabled:
          type: boolean
          description: Whether the action is disabled
        data:
          type: string
          description: Action data (command, message, or script name depending on type)
        recipientAddress:
          type: string
          description: Recipient address
        emailSubject:
          type: string
          description: Email subject
        notificationChannelName:
          type: string
          description: Notification channel name
    SshKey:
      type: object
      properties:
        id:
          type: integer
          description: SSH key ID
        name:
          type: string
          description: SSH key name
        publicKey:
          type: string
          description: Public key in OpenSSH format (included in details and when includePublicKey=true)
    SshKeyCreate:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: SSH key name
        publicKey:
          type: string
          description: Public key to import (omit to generate a new key pair)
        privateKey:
          type: string
          description: Private key to import (required if publicKey is provided)
    SshKeyUpdate:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: SSH key name
        publicKey:
          type: string
          description: New public key
        privateKey:
          type: string
          description: New private key
    SshKeyInUse:
      type: object
      properties:
        reason:
          type: string
          description: Error description
        nodesInUse:
          type: array
          items:
            type: integer
          description: List of node IDs using the key
    WebServiceDefinition:
      type: object
      properties:
        id:
          type: integer
          description: Web service definition ID
        guid:
          type: string
          description: Web service definition GUID
        name:
          type: string
          description: Definition name
        description:
          type: string
          description: Definition description
        url:
          type: string
          description: Web service URL (may contain %1, %2, etc. for parameter substitution)
        httpRequestMethod:
          type: integer
          description: "HTTP request method (0=GET, 1=POST, 2=PUT, 3=DELETE, 4=PATCH)"
        requestData:
          type: string
          description: Request body data
        flags:
          type: integer
          description: "Flags (bit mask: 1=verify certificate, 2=verify host, 4=force plain text parser, 8=follow location)"
        authType:
          type: integer
          description: "Authentication type (0=none, 1=basic, 2=digest, 3=NTLM, 4=bearer, 5=any)"
        login:
          type: string
          description: Login name or token
        password:
          type: string
          description: Password
        cacheRetentionTime:
          type: integer
          description: Cache retention time in milliseconds
        requestTimeout:
          type: integer
          description: Request timeout in milliseconds
        headers:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              value:
                type: string
          description: HTTP headers
    WebServiceDefinitionCreate:
      type: object
      required:
        - name
        - url
      properties:
        name:
          type: string
          description: Definition name
        description:
          type: string
          description: Definition description
        url:
          type: string
          description: Web service URL
        httpRequestMethod:
          type: integer
          description: "HTTP request method (0=GET, 1=POST, 2=PUT, 3=DELETE, 4=PATCH)"
        requestData:
          type: string
          description: Request body data
        flags:
          type: integer
          description: "Flags (bit mask: 1=verify certificate, 2=verify host, 4=force plain text parser, 8=follow location)"
        authType:
          type: integer
