openapi: 3.0.2
info:
  title: NetXMS API
  description: REST API for NetXMS network monitoring server
  version: 1.0.0
tags:
  - name: Authentication
    description: User authentication and session management
  - name: Alarms
    description: Alarm management operations
  - name: Objects
    description: Object management and queries
  - name: Data Collection
    description: Data collection items and historical data
  - name: TCP Proxy
    description: TCP proxy for remote access (VNC, SSH, etc.)
  - name: Grafana
    description: Grafana integration endpoints
  - name: Scheduled Tasks
    description: Scheduled task management
  - name: Script Library
    description: NXSL script library management
  - name: Server Actions
    description: Server action management
  - name: Server
    description: Server information and status
  - name: AI Chat
    description: AI assistant chat sessions
  - name: AI Management
    description: AI skills and functions management
  - name: AI Saved Prompts
    description: Per-user saved prompts for the AI assistant
  - name: Object Tools
    description: Object tool management
  - name: Find
    description: Network search operations
  - name: Geo Areas
    description: Geographic area management
  - name: Object Categories
    description: Object category management
  - name: Image Library
    description: Image library management
  - name: DCI Summary Tables
    description: DCI summary table operations
  - name: Event Templates
    description: Event template management
  - name: Event Processing Policy
    description: Event processing policy management
  - name: Users
    description: User management
  - name: User Groups
    description: User group management
  - name: Notification Channels
    description: Notification channel and driver management
  - name: Event Forwarders
    description: Event forwarder and driver management
  - name: SNMP MIB
    description: Browse the server's compiled SNMP MIB tree
  - name: SSH Keys
    description: SSH key management
  - name: Two-Factor Authentication
    description: Two-factor authentication method management and user bindings
  - name: Web Service Definitions
    description: Web service definition management
  - name: Asset Management Schema
    description: Asset management schema (asset attribute definitions)
  - name: Cloud Connectors
    description: Cloud connector information
paths:
  /:
    get:
      operationId: getRoot
      summary: Root endpoint
      description: Root API endpoint providing basic API information.
      responses:
        '200':
          description: API root information
          content:
            application/json:
              schema:
                type: object
                properties:
                  description:
                    type: string
                    description: API description
                  version:
                    type: string
                    description: NetXMS version
                  build:
                    type: string
                    description: Build tag
                  apiVersion:
                    type: integer
                    description: API version number
      security: []
      tags:
        - Server
  /v1/server-info:
    get:
      operationId: getServerInfo
      summary: Get server information
      description: Retrieve detailed server information including version, build, and configuration details.
      responses:
        '200':
          description: Server information retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  version:
                    type: string
                    description: Server version
                  build:
                    type: string
                    description: Build tag
                  id:
                    type: integer
                    description: Server ID
                  name:
                    type: string
                    description: Server name
                  color:
                    type: string
                    description: Server color (for UI theming)
                  messageOfTheDay:
                    type: string
                    description: Message of the day
                  tz:
                    type: string
                    description: Server timezone
                  options:
                    type: object
                    properties:
                      zoningEnabled:
                        type: boolean
                      strictAlarmStatusFlow:
                        type: boolean
                      timedAlarmAckEnabled:
                        type: boolean
                      helpdeskLinkActive:
                        type: boolean
                      dciAggregationEnabled:
                        type: boolean
                        description: True if DCI data aggregation (hourly/daily tiers) is enabled on the server
                      tileServerURL:
                        type: string
                  dateTimeFormat:
                    type: object
                    properties:
                      date:
                        type: string
                        description: Date format string
                      timeLong:
                        type: string
                        description: Long time format string
                      timeShort:
                        type: string
                        description: Short time format string
                  components:
                    type: array
                    items:
                      type: object
                    description: Registered server components
        '401':
          description: Unauthorized
      security:
        - BearerAuth: []
      tags:
        - Server
  /v1/status:
    get:
      operationId: getSessionStatus
      summary: Get session status
      description: Retrieve current session status including user information.
      responses:
        '200':
          description: Session status retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  userId:
                    type: integer
                    description: Current user ID
                  userName:
                    type: string
                    description: Current user login name
                  systemAccessRights:
                    type: integer
                    description: User's system access rights bitmask
        '401':
          description: Unauthorized
      security:
        - BearerAuth: []
      tags:
        - Server
  /v1/tcp-proxy:
    post:
      operationId: createTcpProxySession
      summary: Create TCP Proxy Session
      description: |
        Create a TCP proxy session and return a short-lived token for WebSocket connection.
        This is the first step in establishing a TCP proxy connection. The returned token
        should be used to connect to the WebSocket endpoint `/v1/tcp-proxy/{token}`.

        **Two-Phase Authorization Flow:**
        1. Call this endpoint with Bearer token authentication to create a TCP tunnel
        2. Server establishes connection to target via agent and returns a session token
        3. Connect to `/v1/tcp-proxy/{token}` WebSocket endpoint (no auth header needed)

        This flow is designed to work with browser WebSocket API which cannot send
        custom Authorization headers.

        **Required Permissions:**
        - System access right: SYSTEM_ACCESS_SETUP_TCP_PROXY
        - Object access right: OBJECT_ACCESS_CONTROL on the target or proxy object
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - port
              properties:
                allowControlMessages:
                  type: boolean
                  description: If true, server will send JSON control messages in text frames (default is false)
                proxyId:
                  type: integer
                  description: |
                    Proxy node ID or zone object ID. If specified, the connection will be established
                    through this proxy node. Either proxyId or nodeId must be specified.
                nodeId:
                  type: integer
                  description: |
                    Target node ID. If proxyId is not specified, the server will automatically select
                    the appropriate proxy for this node. Either proxyId or nodeId must be specified.
                address:
                  type: string
                  format: ip-address
                  description: |
                    Target IP address. Required when proxyId is specified. When using nodeId,
                    the node's primary IP address is used automatically.
                port:
                  type: integer
                  minimum: 1
                  maximum: 65535
                  description: Target TCP port number (required).
            example:
              nodeId: 123
              port: 5900
      responses:
        '201':
          description: TCP proxy session created successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    format: uuid
                    description: Session token for WebSocket connection
                  expiresIn:
                    type: integer
                    description: Token validity period in seconds
                  wsUrl:
                    type: string
                    description: WebSocket URL path to connect to
              example:
                token: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                expiresIn: 30
                wsUrl: "/v1/tcp-proxy/a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        '400':
          description: |
            Bad Request - Invalid parameters.
            Possible reasons:
            - Port parameter missing
            - Invalid IP address format
            - Invalid proxy object type
        '401':
          description: Unauthorized - Authentication token missing or invalid
        '403':
          description: |
            Forbidden - User does not have required permissions.
            Either SYSTEM_ACCESS_SETUP_TCP_PROXY or OBJECT_ACCESS_CONTROL is missing.
        '404':
          description: Object not found - Invalid nodeId or proxyId
        '502':
          description: |
            Bad Gateway - Cannot establish connection to agent.
            Agent may be unreachable or TCP proxy setup failed.
        '503':
          description: Service Unavailable - No proxy node available in zone
      security:
        - BearerAuth: []
      tags:
        - TCP Proxy
  /v1/tcp-proxy/{token}:
    get:
      operationId: connectTcpProxy
      summary: TCP Proxy WebSocket Connection
      description: |
        Establish a WebSocket connection for TCP proxy data transfer. This endpoint
        requires a valid session token obtained from `POST /v1/tcp-proxy`.

        **Token Properties:**
        - Single-use: token is invalidated upon WebSocket connection
        - Short-lived: expires after 30 seconds if not used
        - No authentication header needed: token in path serves as authorization

        **WebSocket Protocol:**
        - Binary frames (opcode 0x02) are used for data transfer in both directions
        - Text frames (opcode 0x01) are used for control messages (JSON format)
        - Close frame (opcode 0x08) terminates the connection

        **Control Messages (JSON):**
        - Connection ready: `{"type": "connected", "channelId": 12345}`
        - Close notification: `{"type": "close", "reason": "normal|error|agent_disconnect"}`
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Session token obtained from POST /v1/tcp-proxy
      responses:
        '101':
          description: |
            Switching Protocols - WebSocket connection established successfully.
            After upgrade, the connection enters WebSocket mode for bidirectional data transfer.
            A JSON message `{"type": "connected", "channelId": N}` is sent after successful upgrade.
          headers:
            Upgrade:
              schema:
                type: string
                example: websocket
            Connection:
              schema:
                type: string
                example: Upgrade
            Sec-WebSocket-Accept:
              schema:
                type: string
        '401':
          description: |
            Unauthorized - Token is invalid, expired, or already used.
            WebSocket close frame with code 1008 (Policy Violation) is sent.
      security: []
      tags:
        - TCP Proxy
  /v1/ai/chat:
    post:
      operationId: createAiChat
      summary: Create AI chat session
      description: Create a new AI assistant chat session.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                incidentId:
                  type: integer
                  description: Optional incident ID to associate with the chat session
                capabilities:
                  type: array
                  description: Optional list of client capabilities. Recognized values - "visualizations" (enables visualization output from the assistant).
                  items:
                    type: string
      responses:
        '201':
          description: Chat session created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  chatId:
                    type: integer
                    description: ID of the created chat session
                  created:
                    type: string
                    format: date-time
                    description: Creation timestamp
        '400':
          description: Invalid incident ID
        '401':
          description: Unauthorized
        '500':
          description: Failed to create chat session
      security:
        - BearerAuth: []
      tags:
        - AI Chat
  /v1/ai/chat/{chat-id}/message:
    post:
      operationId: sendAiChatMessage
      summary: Send message to AI chat
      description: |
        Send a message to the AI assistant. Returns 202 Accepted and processes
        asynchronously. Use GET /v1/ai/chat/{chat-id}/status to poll for result.
      parameters:
        - name: chat-id
          in: path
          required: true
          schema:
            type: integer
          description: Chat session ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - message
              properties:
                message:
                  type: string
                  description: Message text to send to AI assistant
                context:
                  type: object
                  description: Optional context object passed to the AI assistant
      responses:
        '202':
          description: Message accepted for processing
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [processing]
        '400':
          description: Invalid chat ID or missing message
        '401':
          description: Unauthorized
        '403':
          description: Access denied
        '404':
          description: Chat session not found
        '409':
          description: Another request is already in progress
      security:
        - BearerAuth: []
      tags:
        - AI Chat
  /v1/ai/chat/{chat-id}/status:
    get:
      operationId: getAiChatStatus
      summary: Get AI chat processing status
      description: |
        Poll for the current processing status of an AI chat session.
        Returns the status (idle, processing, completed, or error) along with
        any pending question, completed response, or error message.
      parameters:
        - name: chat-id
          in: path
          required: true
          schema:
            type: integer
          description: Chat session ID
      responses:
        '200':
          description: Status retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [idle, processing, completed, error]
                    description: Current processing state
                  pendingQuestion:
                    description: Pending question from AI (present when status is processing)
                    nullable: true
                  currentFunction:
                    type: string
                    description: Name of the function currently being executed by AI (present when status is processing)
                    nullable: true
                  response:
                    type: string
                    description: AI response text (present when status is completed)
                    nullable: true
                  errorMessage:
                    type: string
                    description: Error description (present when status is error)
        '400':
          description: Invalid chat ID
        '401':
          description: Unauthorized
        '403':
          description: Access denied
        '404':
          description: Chat session not found
      security:
        - BearerAuth: []
      tags:
        - AI Chat
  /v1/ai/chat/{chat-id}/question:
    get:
      operationId: getAiChatQuestion
      summary: Poll for pending AI question
      description: Check if the AI assistant has a pending question that needs user input.
      parameters:
        - name: chat-id
          in: path
          required: true
          schema:
            type: integer
          description: Chat session ID
      responses:
        '200':
          description: Question status retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  question:
                    description: Pending question object, or null if no question is pending
                    nullable: true
        '400':
          description: Invalid chat ID
        '401':
          description: Unauthorized
        '403':
          description: Access denied
        '404':
          description: Chat session not found
      security:
        - BearerAuth: []
      tags:
        - AI Chat
  /v1/ai/chat/{chat-id}/answer:
    post:
      operationId: answerAiChatQuestion
      summary: Answer pending AI question
      description: Provide an answer to a pending question from the AI assistant.
      parameters:
        - name: chat-id
          in: path
          required: true
          schema:
            type: integer
          description: Chat session ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - questionId
              properties:
                questionId:
                  type: integer
                  format: int64
                  description: ID of the question being answered
                positive:
                  type: boolean
                  description: Whether the answer is positive (default false)
                selectedOption:
                  type: integer
                  description: Index of selected option (-1 if none)
      responses:
        '200':
          description: Answer accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        '400':
          description: Invalid chat ID or missing question ID
        '401':
          description: Unauthorized
        '403':
          description: Access denied
        '404':
          description: Chat session not found
      security:
        - BearerAuth: []
      tags:
        - AI Chat
  /v1/ai/chat/{chat-id}/clear:
    post:
      operationId: clearAiChatHistory
      summary: Clear AI chat history
      description: Clear the conversation history of an AI chat session.
      parameters:
        - name: chat-id
          in: path
          required: true
          schema:
            type: integer
          description: Chat session ID
      responses:
        '204':
          description: Chat history cleared successfully
        '400':
          description: Invalid chat ID
        '401':
          description: Unauthorized
        '403':
          description: Access denied
        '404':
          description: Chat session not found
      security:
        - BearerAuth: []
      tags:
        - AI Chat
  /v1/ai/chat/{chat-id}:
    delete:
      operationId: deleteAiChat
      summary: Delete AI chat session
      description: Delete an AI chat session and all its history.
      parameters:
        - name: chat-id
          in: path
          required: true
          schema:
            type: integer
          description: Chat session ID
      responses:
        '204':
          description: Chat session deleted successfully
        '400':
          description: Invalid chat ID
        '401':
          description: Unauthorized
        '403':
          description: Access denied
        '404':
          description: Chat session not found
      security:
        - BearerAuth: []
      tags:
        - AI Chat
  /v1/ai/skills-and-functions:
    get:
      operationId: getAiSkillsAndFunctions
      summary: Get AI skills, functions, and disabled items
      description: >-
        Returns all registered AI skills and functions with their disabled status,
        plus stop list entries that do not correspond to any registered entity.
        Requires MANAGE_AI_SKILLS or USE_AI_ASSISTANT access right.
      responses:
        '200':
          description: Skills, functions, and disabled extras retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  skills:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        description:
                          type: string
                        disabled:
                          type: boolean
                        supportsDelegation:
                          type: boolean
                        defaultMode:
                          type: string
                          enum: [loaded, delegated]
                  functions:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        description:
                          type: string
                        disabled:
                          type: boolean
                        parameters:
                          type: array
                          items:
                            type: object
                            properties:
                              name:
                                type: string
                              type:
                                type: string
                  disabledExtras:
                    type: array
                    items:
                      type: object
                      properties:
                        type:
                          type: string
                          enum: [S, F]
                        name:
                          type: string
        '401':
          description: Unauthorized
        '403':
          description: Insufficient access rights
      security:
        - BearerAuth: []
      tags:
        - AI Management
  /v1/ai/disabled-items:
    post:
      operationId: addAiDisabledItem
      summary: Add item to AI disabled list
      description: >-
        Add a skill or function name to the stop list. The item does not need to
        correspond to a currently registered entity. Requires MANAGE_AI_SKILLS access right.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, name]
              properties:
                type:
                  type: string
                  enum: [S, F]
                  description: Item type - S for skill, F for function
                name:
                  type: string
                  description: Name of the skill or function to disable
            example:
              type: F
              name: some-function-name
      responses:
        '204':
          description: Item added to disabled list successfully
        '400':
          description: Invalid or missing type/name
        '401':
          description: Unauthorized
        '403':
          description: Insufficient access rights
        '500':
          description: Database failure
      security:
        - BearerAuth: []
      tags:
        - AI Management
  /v1/ai/disabled-items/{item-type}/{item-name}:
    delete:
      operationId: removeAiDisabledItem
      summary: Remove item from AI disabled list
      description: >-
        Remove a skill or function name from the stop list. Requires MANAGE_AI_SKILLS access right.
      parameters:
        - name: item-type
          in: path
          required: true
          schema:
            type: string
            enum: [S, F]
          description: Item type - S for skill, F for function
        - name: item-name
          in: path
          required: true
          schema:
            type: string
          description: Name of the skill or function to re-enable
      responses:
        '204':
          description: Item removed from disabled list successfully
        '400':
          description: Invalid item type or name
        '401':
          description: Unauthorized
        '403':
          description: Insufficient access rights
        '500':
          description: Database failure
      security:
        - BearerAuth: []
      tags:
        - AI Management
  /v1/ai/observations:
    get:
      operationId: listAiObservations
      summary: Query AI operator observations
      description: >-
        Retrieve observations recorded by AI operator instances, most recent
        first. Requires the "view event log" system access right.
      parameters:
        - name: instance
          in: query
          required: false
          schema:
            type: integer
          description: Limit to observations of the given operator instance
        - name: object
          in: query
          required: false
          schema:
            type: integer
          description: Limit to observations related to the given object
        - name: state
          in: query
          required: false
          schema:
            type: string
            enum: [new, acknowledged, dismissed]
          description: Limit to observations in the given state
        - name: since
          in: query
          required: false
          schema:
            type: string
          description: >-
            Only observations recorded at or after the given time (UNIX
            timestamp, ISO 8601, or relative like -1h)
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 100
          description: Maximum number of records to return (0 = unlimited)
      responses:
        '200':
          description: List of observations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AiObservation'
        '400':
          description: Invalid query parameters
        '403':
          description: Insufficient access rights
        '500':
          description: Database failure
      security:
        - BearerAuth: []
      tags:
        - AI Operators
  /v1/ai/observations/{observation-id}/state:
    put:
      operationId: setAiObservationState
      summary: Set observation state
      description: >-
        Acknowledge or dismiss an AI operator observation (or return it to the
        "new" state). Requires "update alarms" access to the observation's source
        object; server-level observations require the "manage AI operators" system
        access right.
      parameters:
        - name: observation-id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - state
              properties:
                state:
                  type: string
                  enum: [new, acknowledged, dismissed]
                  description: New observation state
      responses:
        '204':
          description: State updated
        '400':
          description: Invalid observation ID or state
        '403':
          description: Insufficient access rights
        '404':
          description: Observation not found
        '500':
          description: Database failure
      security:
        - BearerAuth: []
      tags:
        - AI Operators
  /v1/ai/operators:
    get:
      operationId: listAiOperators
      summary: List AI operator instances
      description: >-
        Retrieve all AI operator instances (perpetual adaptive monitoring
        loops). Requires the "manage AI operators" system access right.
      responses:
        '200':
          description: List of AI operator instances
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AiOperator'
        '403':
          description: Insufficient access rights
      security:
        - BearerAuth: []
      tags:
        - AI Operators
    post:
      operationId: createAiOperator
      summary: Create AI operator instance
      description: >-
        Create a new AI operator instance. New instances are enabled by default
        unless explicitly created as disabled.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AiOperatorConfig'
      responses:
        '201':
          description: Instance created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiOperator'
        '400':
          description: Missing or invalid fields
        '403':
          description: Insufficient access rights
        '500':
          description: Internal server error
      security:
        - BearerAuth: []
      tags:
        - AI Operators
  /v1/ai/operators/{operator-id}:
    get:
      operationId: getAiOperator
      summary: Get AI operator instance details
      parameters:
        - name: operator-id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: AI operator instance details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiOperator'
        '403':
          description: Insufficient access rights
        '404':
          description: Instance not found
      security:
        - BearerAuth: []
      tags:
        - AI Operators
    patch:
      operationId: updateAiOperator
      summary: Modify AI operator instance
      description: >-
        Partially update an AI operator instance; only the fields present in
        the request body are changed.
      parameters:
        - name: operator-id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AiOperatorConfig'
      responses:
        '200':
          description: Updated instance
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiOperator'
        '400':
          description: Invalid configuration
        '403':
          description: Insufficient access rights
        '404':
          description: Instance not found
      security:
        - BearerAuth: []
      tags:
        - AI Operators
    delete:
      operationId: deleteAiOperator
      summary: Delete AI operator instance
      description: Delete an AI operator instance and all its observations.
      parameters:
        - name: operator-id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Instance deleted
        '403':
