      description: |
        Whole-record replace of an existing object tool. Requires SYSTEM_ACCESS_MANAGE_TOOLS.
        The ACL, table columns, and input field definitions are all replaced by the values
        in the request body.
      parameters:
        - name: tool-id
          in: path
          required: true
          schema:
            type: integer
          description: Object tool ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ObjectToolWrite'
      responses:
        '200':
          description: Object tool updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ObjectToolDetails'
        '400':
          description: Missing or invalid request body, tool name, or tool type.
        '403':
          description: Insufficient access rights (SYSTEM_ACCESS_MANAGE_TOOLS required).
        '404':
          description: Tool not found.
        '500':
          description: Database failure.
      security:
        - BearerAuth: []
      tags:
        - Object Tools
    delete:
      operationId: deleteObjectTool
      summary: Delete an object tool
      description: |
        Delete an object tool along with its ACL, table columns and input field definitions.
        Requires SYSTEM_ACCESS_MANAGE_TOOLS.
      parameters:
        - name: tool-id
          in: path
          required: true
          schema:
            type: integer
          description: Object tool ID
      responses:
        '204':
          description: Object tool deleted.
        '400':
          description: Invalid tool ID.
        '403':
          description: Insufficient access rights (SYSTEM_ACCESS_MANAGE_TOOLS required).
        '500':
          description: Database failure.
      security:
        - BearerAuth: []
      tags:
        - Object Tools
