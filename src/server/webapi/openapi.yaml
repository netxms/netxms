        - Objects
    delete:
      operationId: deleteObjectResponsibleUser
      summary: Remove a responsible user
      description: |
        Remove a user or group from the object's responsible users. Idempotent — removing
        a user that is not responsible still returns 204.
      parameters:
        - name: object-id
          in: path
          required: true
          schema:
            type: integer
        - name: user-id
          in: path
          required: true
          schema:
            type: integer
          description: User or group ID.
      responses:
        '204':
          description: Responsible user removed (or was already absent).
        '400':
          description: Invalid user ID.
        '401':
          description: Unauthorized
        '403':
          description: User does not have modify access to the object
        '404':
          description: Object with given ID does not exist
      security:
        - BearerAuth: []
      tags:
        - Objects
  /v1/objects/{object-id}/dashboard:
