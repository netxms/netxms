    AssetAttribute:
      type: object
      description: Asset attribute definition (a single element of the asset management schema).
      required:
        - name
      properties:
        name:
          type: string
          description: Unique attribute name. Must match the pattern ^[A-Za-z$_][A-Za-z0-9$_]*$. Immutable after creation.
        displayName:
          type: string
          description: Human-readable display name.
        dataType:
          type: string
          description: Attribute data type. Accepts the symbolic name (or, for backward compatibility, the numeric code) on input; always returned as the symbolic name.
          enum:
            - String
            - Integer
            - Number
            - Boolean
            - Enum
            - MacAddress
            - IPAddress
            - UUID
            - ObjectReference
            - Date
        isMandatory:
          type: boolean
          description: Whether a value for this attribute is mandatory on assets.
        isUnique:
          type: boolean
          description: Whether the attribute value must be unique across all assets.
        isHidden:
          type: boolean
          description: Whether the attribute is hidden in the UI.
        autofillScript:
          type: string
          description: NXSL script used to automatically populate the attribute value.
        rangeMin:
          type: integer
          description: Minimum value (for numeric types) or minimum length (for strings). 0 means unset.
        rangeMax:
          type: integer
          description: Maximum value (for numeric types) or maximum length (for strings). 0 means unset.
        systemType:
          type: string
          description: System type binding for the attribute. Accepts the symbolic name (or the numeric code) on input; always returned as the symbolic name.
          enum:
            - None
            - Serial
            - IPAddress
            - MacAddress
            - Vendor
            - Model
        enumMap:
          type: object
          description: For the Enum data type, the map of allowed values to their display names.
          additionalProperties:
            type: string
    Alarm:
