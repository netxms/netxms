      description: Retrieve a single asset attribute definition by name. Available to any authenticated user.
      parameters:
        - name: attribute-name
          in: path
          required: true
          schema:
            type: string
            description: Asset attribute name.
      responses:
        '200':
          description: Asset attribute details.
          content:
