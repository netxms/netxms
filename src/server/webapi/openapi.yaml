      operationId: disableObjectTool
      summary: Disable an object tool
      description: |
        Sets the `disabled` flag on the tool so that it is hidden from per-object tool lists
        and cannot be executed. Requires SYSTEM_ACCESS_MANAGE_TOOLS.
      parameters:
        - name: tool-id
          in: path
          required: true
          schema:
            type: integer
          description: Object tool ID
      responses:
        '204':
          description: Object tool disabled.
        '400':
          description: Invalid tool ID.
        '403':
          description: Insufficient access rights (SYSTEM_ACCESS_MANAGE_TOOLS required).
        '500':
          description: Database failure.
      security:
        - BearerAuth: []
      tags:
        - Object Tools
  /v1/object-tools/{tool-id}/enable:
    post:
      operationId: enableObjectTool
      summary: Enable an object tool
      description: |
        Clears the `disabled` flag on the tool. Requires SYSTEM_ACCESS_MANAGE_TOOLS.
      parameters:
        - name: tool-id
          in: path
          required: true
          schema:
            type: integer
          description: Object tool ID
      responses:
        '204':
          description: Object tool enabled.
        '400':
          description: Invalid tool ID.
        '403':
          description: Insufficient access rights (SYSTEM_ACCESS_MANAGE_TOOLS required).
        '500':
          description: Database failure.
      security:
        - BearerAuth: []
      tags:
        - Object Tools
  /v1/object-tools/{tool-id}/execute:
    post:
      operationId: executeObjectTool
      summary: Execute an object tool
      description: |
        Execute a server-capable object tool on the specified object.
        Supported tool types: action (agent action), server-command, server-script,
        snmp-table, agent-table, agent-list, ssh-command, url.
        Client-only tool types (internal, command, file-download) are rejected with 400.
      tags:
        - Object Tools
      parameters:
        - name: tool-id
          in: path
          required: true
          schema:
            type: integer
          description: Object tool ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - objectId
              properties:
                objectId:
                  type: integer
                  description: ID of the target object to execute the tool on
                alarmId:
                  type: integer
                  description: Optional alarm ID for macro expansion context
                  default: 0
                inputFields:
                  type: object
                  additionalProperties:
                    type: string
                  description: Optional input field values for macro expansion
                maskedFields:
                  type: array
                  items:
                    type: string
                  description: |
                    Optional list of input field names whose values must be masked
                    in the audit log and in user-visible context such as the result
                    table title for table tools (typically password-type fields).
                    Names not present in inputFields are ignored.
                stream:
                  type: boolean
                  description: |
                    If true and the tool generates output, execution starts asynchronously
                    and a WebSocket token is returned for streaming output. Supported for
                    tool types: action, server-command, server-script, ssh-command.
                  default: false
      responses:
        '200':
          description: Tool executed successfully (synchronous mode)
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ObjectToolTextResult'
                  - $ref: '#/components/schemas/ObjectToolTableResult'
                  - $ref: '#/components/schemas/ObjectToolNoResult'
                  - $ref: '#/components/schemas/ObjectToolUrlResult'
                discriminator:
                  propertyName: type
                  mapping:
                    text: '#/components/schemas/ObjectToolTextResult'
                    table: '#/components/schemas/ObjectToolTableResult'
                    none: '#/components/schemas/ObjectToolNoResult'
                    url: '#/components/schemas/ObjectToolUrlResult'
        '202':
          description: |
            Tool execution started in streaming mode. Connect to the returned
            WebSocket URL to receive output in real-time.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ObjectToolStreamingResult'
        '400':
          description: |
            Invalid request. Possible reasons:
            - Invalid or missing tool-id
            - Missing or invalid objectId
            - Tool type is client-only (internal, command, file-download)
            - Tool is disabled
            - Incompatible object class for the tool type
            - SSH command target has no owning node (standalone access point, sensor without gateway)
        '403':
          description: |
            Access denied. Possible reasons:
            - User does not have access to the tool (tool ACL)
            - User does not have OBJECT_ACCESS_CONTROL on the target object (or on the owning node for SSH tools on interface/sensor/access point)
            - User does not have access to the specified alarm
        '404':
          description: |
            Not found. Possible reasons:
            - Object tool with the given ID does not exist
            - Target object with the given objectId does not exist
            - Script not found in library (for server-script tools)
        '500':
          description: |
            Execution failed. Possible reasons:
            - Database failure loading tool metadata
            - Cannot connect to agent
            - Command execution failed
            - Script execution failed
            - Table tool execution failed
            - SSH proxy not available
          content:
            application/json:
              schema:
                type: object
                description: Error body for server-script execution failure (other failures return no body).
                properties:
                  reason:
                    type: string
                    description: Failure reason
                  diagnostic:
                    type: object
                    description: NXSL diagnostic information, when available
        '504':
          description: Server command execution timed out.
      security:
        - BearerAuth: []
  /v1/object-tools/output/{token}:
    get:
      operationId: connectObjectToolOutput
      summary: Connect to tool output stream (WebSocket)
      description: |
        WebSocket endpoint for receiving streaming output from an object tool execution.
        The token is obtained from POST /v1/object-tools/{tool-id}/execute with stream=true.
        Token is single-use and expires after 30 seconds.

        Server sends JSON text frames:
        - `{"type":"output","data":"..."}` - output chunk
        - `{"type":"result","data":"..."}` - script return value (server-script tools only)
        - `{"type":"completed"}` - execution finished successfully
        - `{"type":"error","message":"..."}` - execution failed
      tags:
        - Object Tools
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Single-use token from the streaming execute response
      responses:
        '101':
          description: Switching protocols to WebSocket
  /v1/event-processing-policy:
    get:
      operationId: getEventProcessingPolicy
      summary: Get event processing policy
      description: |
        Retrieve the complete event processing policy as an ordered list of rules. The returned
        `version` value should be sent back unchanged in a subsequent update request to detect
        concurrent modifications (optimistic concurrency control).
      responses:
        '200':
          description: Event processing policy retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventProcessingPolicy'
        '401':
          description: Unauthorized
        '403':
          description: User does not have EPP access right
      security:
        - BearerAuth: []
      tags:
        - Event Processing Policy
    put:
      operationId: updateEventProcessingPolicy
      summary: Replace event processing policy
      description: |
        Replace the entire event processing policy with the supplied ordered list of rules.
        If `version` is present in the request body it must match the current policy version,
        otherwise the request is rejected with status 409 and the body contains the current
        `currentVersion`. If `version` is omitted the policy is replaced unconditionally.

        Each rule may be supplied either in the form produced by this API (object IDs and event
        codes as plain integers) or as a configuration export record (object/event references as
        objects carrying name and GUID); the latter form is resolved on import and any references
        that cannot be resolved are dropped, with details returned in the optional `warnings` field.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventProcessingPolicyUpdateRequest'
      responses:
        '200':
          description: Event processing policy updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventProcessingPolicyUpdateResult'
        '400':
          description: Invalid event processing policy data
        '401':
          description: Unauthorized
        '403':
          description: User does not have EPP access right
        '409':
          description: Version conflict - the policy was modified by another client
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  currentVersion:
                    type: integer
                    description: Current policy version on the server
        '500':
          description: Database failure
      security:
        - BearerAuth: []
      tags:
        - Event Processing Policy
  /v1/event-processing-policy/rules/{rule-guid}:
    get:
      operationId: getEventProcessingPolicyRule
      summary: Get event processing policy rule
      description: Retrieve a single event processing policy rule by its GUID.
      parameters:
        - name: rule-guid
          in: path
          required: true
