  /v1/alarms:
    get:
      operationId: listAlarms
      summary: List Alarms
      description: Retrieve a list of alarms.
      parameters:
        - name: rootObject
          in: query
          schema:
            type: integer
            description: ID of root object for alarm retrieval (0 to retrieve all alarms)
        - name: includeObjectDetails
          in: query
          schema:
            type: boolean
            description: If true, include full source object details in response
      responses:
        '200':
          description: Successful retrieval of alarms.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    severity:
                      type: integer
                      description: "Current severity: 0=Normal, 1=Warning, 2=Minor, 3=Major, 4=Critical"
                    state:
                      type: integer
                      description: "Alarm state: 0=Outstanding, 1=Acknowledged, 2=Resolved, 3=Terminated"
                    source:
                      type: integer
                      description: Source object ID
                    sourceName:
                      type: string
                      description: Name of the source object
                    zoneUIN:
                      type: integer
                      description: Zone UIN of the source object (0 if zoning is disabled)
                    message:
                      type: string
                    repeatCount:
                      type: integer
                      description: Number of times the alarm was raised
                    commentCount:
                      type: integer
                      description: Number of comments attached to the alarm
                    helpdeskReference:
                      type: string
                      description: Helpdesk issue reference (empty if not linked)
                    creationTime:
                      type: string
                      format: date-time
                    lastChangeTime:
                      type: string
                      format: date-time
                    ackByUserName:
                      type: string
                      description: Name of the user who acknowledged the alarm (empty if not acknowledged)
                    resolvedByUserName:
                      type: string
                      description: Name of the user who resolved the alarm (empty if not resolved)
                    categories:
                      type: array
                      description: Alarm categories (as assigned by the event processing policy rule that raised the alarm)
                      items:
                        $ref: '#/components/schemas/AlarmCategoryReference'
                    sourceObject:
                      allOf:
                        - $ref: '#/components/schemas/ObjectSummary'
                      description: Full source object summary. Present only when includeObjectDetails=true.
      security:
        - BearerAuth: []
      tags:
        - Alarms
