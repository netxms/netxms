        is assigned a new one. Only dashboard content fields are applied — other object
        properties are left untouched. `displayPriority` and `forcedContextObjectId` apply to
        plain dashboards only and are ignored for dashboard templates. Requires modify access
        and applies only to objects of class `Dashboard` or `DashboardTemplate`.
      parameters:
