          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ObjectDetails'
        '400':
          description: Malformed request body, invalid value, or property group not applicable to object class.
        '401':
          description: Unauthorized
        '403':
          description: User does not have modify access to the object
        '404':
          description: Object with given ID does not exist
      security:
        - BearerAuth: []
      tags:
        - Objects
  /v1/objects/{object-id}/auto-bind:
    patch:
      operationId: updateObjectAutoBind
      summary: Update object auto-bind configuration
      description: |
        Update the auto-bind filters of an auto-bind-capable object (Container, Collector,
        Circuit, Cluster, NetworkMap, Template, Dashboard, BusinessService and business
        service prototype). Each object supports up to two filter slots; entries in the
        `autoBindFilters` array are applied positionally to slots 0, 1, … Within each entry
        omitted keys are left unchanged; a `null` or omitted `source` clears that slot's
        filter script.

        Filter scripts are compiled and validated by default; a compilation failure returns
        400 with a `diagnostic` object. Pass `?validate=false` to store work-in-progress or
        intentionally broken scripts (matches the NXCP "always store" behavior).

        This property group applies only to auto-bind-capable object classes; sending it to
        any other class returns 400.
      parameters:
        - name: object-id
          in: path
          required: true
          schema:
            type: integer
        - name: validate
          in: query
          required: false
          description: When false, skip compilation of filter scripts.
          schema:
            type: boolean
            default: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                autoBindFilters:
                  type: array
                  description: Per-slot auto-bind filter configuration, applied positionally.
                  maxItems: 2
                  items:
                    type: object
                    additionalProperties: false
                    properties:
                      autoBind:
                        type: boolean
                        description: Automatically bind matching objects.
                      autoUnbind:
                        type: boolean
                        description: Automatically unbind objects that no longer match (only effective when autoBind is enabled).
                      source:
                        type: string
                        nullable: true
                        description: NXSL filter script source; null clears the slot.
      responses:
        '200':
          description: Auto-bind configuration updated; full updated object returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ObjectDetails'
        '400':
          description: Malformed request body, filter script compilation failure, or property group not applicable to object class.
        '401':
          description: Unauthorized
        '403':
          description: User does not have modify access to the object
        '404':
          description: Object with given ID does not exist
      security:
        - BearerAuth: []
      tags:
        - Objects
  /v1/objects/{object-id}/snmp:
    get:
      operationId: getObjectSnmpConfig
      summary: Get node SNMP communication configuration
      description: |
        Return the node's SNMP communication settings (the same shape accepted by the
        matching PATCH). Credential passwords (`authPassword`, `privPassword`, and their
        `trap` counterparts) are included only when the caller has modify or read-credentials
        access to the object.

        This property group applies to Node objects only; requesting it for any other object
        class returns 400.
      parameters:
        - name: object-id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: SNMP communication configuration.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SnmpConfig'
        '400':
          description: Property group not applicable to object class.
        '401':
          description: Unauthorized
        '403':
          description: User does not have read access to the object
        '404':
          description: Object with given ID does not exist
      security:
        - BearerAuth: []
      tags:
        - Objects
    patch:
      operationId: updateObjectSnmpConfig
      summary: Update node SNMP communication configuration
      description: |
        Update the node's SNMP communication settings: protocol version, UDP port, proxy
        node, codepage, the "prevent automatic SNMP configuration changes" lock, the polling
        credentials, and (optionally) separate SNMP trap reception credentials. Merge-patch
        semantics: any subset of fields can be sent; omitted fields are left unchanged.

        `authName` holds the community string for SNMP v1/v2c and the USM user name for SNMP
        v3. When `version` is present it is applied first (so `authName` is stored in the
        correct slot) and is clamped up to the server-wide minimum SNMP version. The v3
        `authMethod`, `privMethod`, `authPassword` and `privPassword` fields are only
        meaningful for SNMP v3.

        The `trap` object configures separate credentials for received SNMP traps and is
        itself merge-patched (creating the trap credentials if they did not exist yet);
        sending `trap: null` reverts to using the polling credentials. `authPassword` and
        `privPassword` are write-only and are never returned by GET unless sensitive data is
        explicitly requested.

        This property group applies to Node objects only; sending it to any other object
        class returns 400.
      parameters:
        - name: object-id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SnmpConfig'
      responses:
        '200':
          description: SNMP configuration updated; full updated object returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ObjectDetails'
        '400':
          description: Malformed request body, invalid value, or property group not applicable to object class.
        '401':
          description: Unauthorized
        '403':
          description: User does not have modify access to the object
        '404':
          description: Object with given ID does not exist
      security:
        - BearerAuth: []
      tags:
        - Objects
  /v1/objects/{object-id}/agent:
    get:
      operationId: getObjectAgentConfig
      summary: Get node agent communication configuration
      description: |
        Return the node's NetXMS agent communication settings (the same shape accepted by the
        matching PATCH). The `sharedSecret` is included only when the caller has modify or
        read-credentials access to the object.

        This property group applies to Node objects only; requesting it for any other object
        class returns 400.
      parameters:
        - name: object-id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Agent communication configuration.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentConfig'
        '400':
          description: Property group not applicable to object class.
        '401':
          description: Unauthorized
        '403':
          description: User does not have read access to the object
        '404':
          description: Object with given ID does not exist
      security:
        - BearerAuth: []
      tags:
        - Objects
    patch:
      operationId: updateObjectAgentConfig
      summary: Update node agent communication configuration
      description: |
        Update the node's NetXMS agent communication settings: TCP port, proxy node, shared
        secret, the force-encryption and agent-over-tunnel-only flags, the agent DCI cache
        mode and the protocol compression mode. Merge-patch semantics: any subset of fields
        can be sent; omitted fields are left unchanged. `sharedSecret` is write-only and is
        never returned by GET unless sensitive data is explicitly requested.

        This property group applies to Node objects only; sending it to any other object
        class returns 400.
      parameters:
        - name: object-id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentConfig'
      responses:
        '200':
          description: Agent configuration updated; full updated object returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ObjectDetails'
        '400':
          description: Malformed request body, invalid value, or property group not applicable to object class.
        '401':
          description: Unauthorized
        '403':
          description: User does not have modify access to the object
        '404':
          description: Object with given ID does not exist
      security:
        - BearerAuth: []
      tags:
        - Objects
  /v1/objects/{object-id}/custom-attributes:
    get:
      operationId: getObjectCustomAttributes
      summary: Get object custom attributes
      description: |
        Retrieve the object's custom attributes as an array. Each element carries the
        attribute name, value, flags and the source object. This is the same
        representation that is embedded as the `customAttributes` array in the full
        object document. Inherited attributes are included; the `sourceObject` field
        identifies the object an inherited attribute originates from (0 when the
        attribute is defined directly on this object).
      parameters:
        - name: object-id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Array of custom attributes.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CustomAttribute'
                example:
                  - name: rack
                    value: A12
                    flags:
                      inheritable: false
                      redefined: false
                      conflict: false
                    sourceObject: 0
        '401':
          description: Unauthorized
        '403':
          description: User does not have modify access to the object
        '404':
          description: Object with given ID does not exist
      security:
        - BearerAuth: []
      tags:
        - Objects
  /v1/objects/{object-id}/custom-attributes/{name}:
    put:
      operationId: updateObjectCustomAttribute
      summary: Create or update a single custom attribute
      description: |
        Upsert a single custom attribute identified by name. The name is taken from the
        URL path (URL-encoded). It must be 1-127 characters, must not contain a slash or
        any control character; spaces, dots, dashes, colons and unicode are allowed.
      parameters:
        - name: object-id
          in: path
          required: true
          schema:
            type: integer
        - name: name
          in: path
          required: true
          schema:
            type: string
          description: Custom attribute name (URL-encoded).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                value:
                  type: string
                  nullable: true
                  description: Attribute value. Null or absent is treated as an empty string.
                inheritable:
                  type: boolean
                  description: Whether the attribute is inherited by child objects. Defaults to false.
      responses:
        '200':
          description: Attribute created or updated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                  value:
                    type: string
                  inheritable:
                    type: boolean
        '400':
          description: Invalid attribute name or request body.
        '401':
          description: Unauthorized
        '403':
          description: User does not have modify access to the object
        '404':
          description: Object with given ID does not exist
      security:
        - BearerAuth: []
      tags:
        - Objects
    delete:
      operationId: deleteObjectCustomAttribute
      summary: Delete a single custom attribute
      description: |
        Remove a custom attribute by name. Idempotent — deleting an attribute that does
        not exist still returns 204.
      parameters:
        - name: object-id
          in: path
          required: true
          schema:
            type: integer
        - name: name
          in: path
          required: true
          schema:
            type: string
          description: Custom attribute name (URL-encoded).
      responses:
        '204':
          description: Attribute deleted (or was already absent).
        '400':
          description: Invalid attribute name.
        '401':
          description: Unauthorized
        '403':
          description: User does not have modify access to the object
        '404':
          description: Object with given ID does not exist
      security:
        - BearerAuth: []
      tags:
        - Objects
  /v1/objects/{object-id}/asset-properties:
    get:
      operationId: getObjectAssetProperties
      summary: Get asset properties
      description: |
