              schema:
                $ref: '#/components/schemas/AssetAttribute'
        '400':
          description: Invalid request.
        '401':
          description: Unauthorized.
        '403':
          description: Access denied.
        '404':
          description: Asset attribute not found.
        '500':
          description: Internal server error.
      security:
        - BearerAuth: []
    delete:
      operationId: deleteAssetAttribute
      tags:
        - Asset Management Schema
      summary: Delete an asset attribute
      description: Delete an asset attribute definition. All property values stored for this attribute on existing assets are also removed. Requires "Manage asset management schema" system access right.
      parameters:
        - name: attribute-name
          in: path
          required: true
          schema:
            type: string
            description: Asset attribute name.
      responses:
        '204':
          description: Asset attribute deleted successfully.
        '400':
          description: Invalid attribute name.
        '401':
          description: Unauthorized.
        '403':
          description: Access denied.
        '404':
          description: Asset attribute not found.
        '500':
          description: Internal server error.
      security:
        - BearerAuth: []
