      security:
        - BearerAuth: []
    put:
      operationId: updateAssetAttribute
      tags:
        - Asset Management Schema
      summary: Update an asset attribute
      description: Update an existing asset attribute definition. Only the fields present in the request body are modified (merge-patch semantics); the attribute name itself cannot be changed. Requires "Manage asset management schema" system access right.
      parameters:
        - name: attribute-name
          in: path
          required: true
          schema:
            type: string
            description: Asset attribute name.
      requestBody:
        required: true
