  /v1/login:
    post:
      operationId: login
      summary: User Login
      description: Authenticate a user and respond with a token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                password:
                  type: string
                method:
                  type: string
                  description: Choosen 2FA method.
                requestId:
                  type: string
                  description: Request ID provided by server in response to 2FA method selection.
                challenge:
                  type: string
                  description: 2FA challenge provided by server
                response:
                  type: string
                  description: 2FA response provided by client
              required:
                - username
                - password
      responses:
        '201':
          description: Successful login.
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    description: Authentication token.
                  userId:
                    type: integer
                  systemAccessRights:
                    type: integer
                  changePassword:
                    type: boolean
                    description: Indicates if password change is required for this user.
                  graceLogins:
                    type: integer
                    description: Number of grace logins left if password change is required.
        '400':
          description: Bad Request - Invalid request body
        '401':
          description: Unauthorized.
          headers:
            WWW-Authenticate:
              description: Challenge "2FA" indicates that request should be repeated with one of provided 2FA methods. If method was provided, response will contain request ID and challenge.
              schema:
                type: string
                example: 2FA TOTP,Telegram
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                type: object
                properties:
                  errorCode:
                    type: integer
                    description: Error code that can provide additional information on login failure reasons.
      security: []
      tags:
        - Authentication
  /v1/logout:
    post:
      operationId: logout
      summary: User Logout
      description: Logout a user and invalidate their token.
      responses:
        '204':
          description: Successful logout.
      security:
        - BearerAuth: []
      tags:
        - Authentication
  /v1/objects:
    get:
      operationId: listObjects
      summary: List objects
      description: Retrieve a list of objects (with optional filter).
      parameters:
        - name: filter
          in: query
          schema:
            type: string
            description: Optional filter string. If provided, only objects with name or alias containing given string will be returned.
        - name: parent
          in: query
          schema:
            type: integer
            description: Optional parent object ID. If provided, only child objects of given parent object will be returned, otherwise all top-level objects will be returned.
      responses:
        '200':
          description: Successful retrieval of objects.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ObjectSummary'
        '401':
          description: Unauthorized.
      security:
        - BearerAuth: []
      tags:
        - Objects
    post:
      operationId: createObject
      summary: Create a new object
      description: |
        Create a new object. The caller must have CREATE access on the parent object (or on
        the entire network when creating a top-level node). The `class` field selects the
        object type and determines which additional fields are meaningful; fields not relevant
        to the selected class are ignored. After construction the same document is applied to
        the new object using merge-patch semantics (see `PATCH /v1/objects/{object-id}`), so
        common scalar properties such as `comments` and `alias` can be set in the same call.
        On success the full created object is returned and the `Location` header points to it.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ObjectCreationRequest'
      responses:
        '201':
          description: Object created. Response body is the full object representation.
          headers:
            Location:
              description: Relative URL of the created object.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ObjectDetails'
        '400':
          description: Malformed request, unknown object class, or invalid property value.
        '401':
          description: Unauthorized.
        '403':
          description: User does not have create access on the parent object, or node count license exceeded.
        '404':
          description: Parent object or referenced asset does not exist.
        '409':
          description: |
            Conflict — subnet overlaps an existing subnet, node IP address is already in use,
            or zone UIN is already taken. For a subnet overlap the response body contains a
            `conflictingObjects` array with the identifiers of the conflicting objects.
        '500':
          description: Object creation failed (internal error).
      security:
        - BearerAuth: []
      tags:
        - Objects
  /v1/objects/{object-id}:
    get:
      operationId: getObject
      summary: Get object details
      description: Retrieve specific object details. Contains data for object overview, alarms, and last values.
      parameters:
        - name: object-id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Successful retrieval of object details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ObjectDetails'
        '401':
          description: Unauthorized
        '403':
          description: User does not have read access to given object
        '404':
          description: Object with given ID does not exist
      security:
        - BearerAuth: []
      tags:
        - Objects
    patch:
      operationId: updateObjectProperties
      summary: Update common object properties
      description: |
        Update common scalar properties on any NetObj. Request body uses JSON merge-patch
        semantics (RFC 7396) — fields present in the body are updated, fields omitted are
        left untouched, and explicit `null` clears the field. Returns the updated object
        in the same shape as `GET /v1/objects/{object-id}`. Class-specific property groups
        (snmp, agent, polling, etc.) are exposed as separate sub-resources.
      parameters:
        - name: object-id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Merge-patch document with any subset of the listed properties.
              additionalProperties: false
              properties:
                name:
                  type: string
                  description: Object name (control characters are replaced with spaces).
                alias:
                  type: string
                  nullable: true
                  description: Object alias. `null` or empty string clears the alias.
                nameOnMap:
                  type: string
                  nullable: true
                  description: Display name used on network maps. `null` clears the override.
                comments:
                  type: string
                  nullable: true
                  description: Free-form object comments. `null` or empty string clears them.
                category:
                  type: integer
                  nullable: true
                  description: Object category ID. `null` or `0` clears the category.
                mapImage:
                  type: string
                  format: uuid
                  nullable: true
                  description: Image library UUID for the object on maps. `null` clears the image.
                drilldownObjectId:
                  type: integer
                  nullable: true
                  description: ID of the object opened on drill-down. `null` or `0` clears the link.
                macAddress:
                  type: string
                  description: >-
                    Interface only. MAC address in any accepted textual notation. Allowed
                    only for manually created interfaces; rejected otherwise.
                requiredPollCount:
                  type: integer
                  description: Interface only. Number of consecutive polls required to change status.
                expectedState:
                  type: integer
                  description: >-
                    Interface only. Expected interface state (0 = UP, 1 = DOWN, 2 = IGNORE, 3 = AUTO).
                peer:
                  type: integer
                  nullable: true
                  description: >-
                    Interface only. ID of the peer interface to link to. Establishes a manual
                    bidirectional peer link (any previous peer on either side is cleared) and
                    requires modify access on the peer interface. `null` or `0` clears the
                    current peer.
      responses:
        '200':
          description: Object updated; full updated object returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ObjectDetails'
        '400':
          description: Malformed request body or invalid property value.
        '401':
          description: Unauthorized
        '403':
          description: User does not have modify access to the object (or to the peer interface)
        '404':
          description: Object with given ID does not exist
      security:
        - BearerAuth: []
      tags:
        - Objects
  /v1/objects/{object-id}/location:
    patch:
      operationId: updateObjectLocation
      summary: Update object geo location and postal address
      description: |
        Update the object's geo location and/or postal address. Body uses JSON merge-patch
        semantics — present fields are applied, omitted fields are left alone. Setting
        `geoLocation` to `null` clears the location (type becomes UNSET); setting
        `postalAddress` to `null` clears every postal field. Updating `geoLocation`
        also queues an entry in the object's geo-location history.
      parameters:
        - name: object-id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
