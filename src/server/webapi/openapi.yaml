        '503':
          description: MIB tree is not loaded
      security:
        - BearerAuth: []
      tags:
        - SNMP MIB
  /v1/snmp-mib/{oid}:
    get:
      operationId: getMibNode
      summary: Get MIB node by OID
      description: Retrieve the MIB node identified by the given OID, including its immediate children. The OID is a dotted numeric path with no leading dot (for example `1.3.6.1.2.1.1.1`).
      parameters:
        - name: oid
          in: path
          required: true
          schema:
            type: string
          description: Dotted numeric OID without a leading dot (e.g. `1.3.6.1.2.1.1.1`).
      responses:
        '200':
          description: MIB node retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MibNode'
        '400':
          description: Invalid OID
        '401':
          description: Unauthorized
        '404':
          description: No MIB object found with the given OID
        '503':
          description: MIB tree is not loaded
      security:
        - BearerAuth: []
      tags:
        - SNMP MIB
