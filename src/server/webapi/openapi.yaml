          description: User does not have MANAGE_USERS access right
        '404':
          description: User group not found
      security:
        - BearerAuth: []
      tags:
        - User Groups
    put:
      operationId: updateUserGroup
      summary: Update user group
      description: Update an existing user group. Only the fields provided in the request body will be modified. Requires MANAGE_USERS access right.
      parameters:
        - name: group-id
          in: path
          required: true
          schema:
            type: integer
          description: Group ID (includes GROUP_FLAG bit)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserGroupUpdateInput'
      responses:
        '200':
          description: User group updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserGroup'
        '400':
          description: Invalid group ID or invalid group name
        '401':
          description: Unauthorized
        '403':
          description: User does not have MANAGE_USERS access right
        '404':
          description: User group not found
        '409':
          description: Group with this name already exists
        '500':
          description: Database failure
      security:
        - BearerAuth: []
      tags:
        - User Groups
    delete:
      operationId: deleteUserGroup
      summary: Delete user group
      description: |
        Delete a user group. The "Everyone" group (ID 1073741824) cannot be deleted.
      parameters:
        - name: group-id
          in: path
          required: true
          schema:
            type: integer
          description: Group ID (includes GROUP_FLAG bit)
      responses:
        '204':
          description: User group deleted successfully
        '400':
          description: Invalid group ID or attempt to delete Everyone group
        '401':
          description: Unauthorized
        '403':
          description: User does not have MANAGE_USERS access right
        '404':
          description: User group not found
        '500':
          description: Database failure
      security:
        - BearerAuth: []
      tags:
        - User Groups
  /v1/users/{user-id}/2fa-bindings:
    get:
      operationId: listUser2faBindings
      summary: List user's 2FA bindings
      description: |
        Retrieve the list of two-factor authentication method bindings for a specific user.
        Users can view their own bindings; viewing other users' bindings requires MANAGE_USERS access right.
      parameters:
        - name: user-id
          in: path
          required: true
          schema:
            type: integer
          description: User ID
      responses:
        '200':
          description: 2FA bindings retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TwoFactorBinding'
        '400':
          description: Invalid user ID
        '403':
          description: Access denied (not own user and no MANAGE_USERS right)
        '404':
          description: User not found
      security:
        - BearerAuth: []
      tags:
        - Two-Factor Authentication
  /v1/users/{user-id}/2fa-bindings/{method-name}:
    put:
      operationId: setUser2faBinding
      summary: Create or update user 2FA binding
      description: |
        Create or update a two-factor authentication method binding for a specific user.
        Users can manage their own bindings; managing other users' bindings requires MANAGE_USERS access right.
      parameters:
        - name: user-id
          in: path
          required: true
          schema:
            type: integer
          description: User ID
        - name: method-name
          in: path
          required: true
          schema:
            type: string
          description: 2FA method name
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties:
                type: string
              description: Method-specific configuration as key-value pairs
      responses:
        '200':
          description: 2FA binding updated successfully
        '400':
          description: Invalid user ID or missing method name
        '403':
          description: Access denied (not own user and no MANAGE_USERS right)
        '404':
          description: User not found or unknown 2FA method
        '500':
          description: Internal error
      security:
        - BearerAuth: []
      tags:
        - Two-Factor Authentication
    delete:
      operationId: deleteUser2faBinding
      summary: Delete user 2FA binding
      description: |
        Delete a two-factor authentication method binding for a specific user.
        Users can manage their own bindings; managing other users' bindings requires MANAGE_USERS access right.
      parameters:
        - name: user-id
          in: path
          required: true
          schema:
            type: integer
          description: User ID
        - name: method-name
          in: path
          required: true
          schema:
            type: string
          description: 2FA method name
      responses:
        '204':
          description: 2FA binding deleted successfully
        '400':
          description: Invalid user ID or missing method name
        '403':
          description: Access denied (not own user and no MANAGE_USERS right)
        '404':
          description: User not found or binding not found
        '500':
          description: Internal error
      security:
        - BearerAuth: []
      tags:
        - Two-Factor Authentication
  /v1/2fa/drivers:
    get:
      operationId: list2faDrivers
      summary: List available 2FA drivers
      description: Retrieve the list of available two-factor authentication drivers. Requires MANAGE_2FA_METHODS access right.
      responses:
        '200':
          description: 2FA drivers retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
                example: ["TOTP", "Message"]
        '403':
          description: User does not have MANAGE_2FA_METHODS access right
      security:
        - BearerAuth: []
      tags:
        - Two-Factor Authentication
  /v1/2fa/methods:
    get:
      operationId: list2faMethods
      summary: List 2FA methods
      description: Retrieve the list of configured two-factor authentication methods. Requires MANAGE_2FA_METHODS access right.
      responses:
        '200':
          description: 2FA methods retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TwoFactorMethod'
        '403':
          description: User does not have MANAGE_2FA_METHODS access right
      security:
        - BearerAuth: []
      tags:
        - Two-Factor Authentication
    post:
      operationId: create2faMethod
      summary: Create 2FA method
      description: Create a new two-factor authentication method. Requires MANAGE_2FA_METHODS access right.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TwoFactorMethodInput'
      responses:
        '201':
          description: 2FA method created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TwoFactorMethod'
        '400':
          description: Missing or invalid required fields, or unknown driver
        '403':
          description: User does not have MANAGE_2FA_METHODS access right
        '409':
          description: Method with this name already exists
        '500':
          description: Database failure
      security:
        - BearerAuth: []
      tags:
        - Two-Factor Authentication
  /v1/2fa/methods/{method-name}:
    get:
      operationId: get2faMethod
      summary: Get 2FA method details
      description: Retrieve details of a specific two-factor authentication method. Requires MANAGE_2FA_METHODS access right.
      parameters:
        - name: method-name
          in: path
          required: true
          schema:
            type: string
          description: 2FA method name
      responses:
        '200':
          description: 2FA method retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TwoFactorMethod'
        '400':
          description: Missing method name
        '403':
          description: User does not have MANAGE_2FA_METHODS access right
        '404':
          description: Method not found
      security:
        - BearerAuth: []
      tags:
        - Two-Factor Authentication
    put:
      operationId: update2faMethod
      summary: Update 2FA method
      description: |
        Update an existing two-factor authentication method. Only the fields provided
        in the request body will be modified. Requires MANAGE_2FA_METHODS access right.
      parameters:
        - name: method-name
          in: path
          required: true
          schema:
            type: string
          description: 2FA method name
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TwoFactorMethodInput'
      responses:
        '200':
          description: 2FA method updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TwoFactorMethod'
        '400':
          description: Unknown driver
        '403':
          description: User does not have MANAGE_2FA_METHODS access right
        '404':
          description: Method not found
        '500':
          description: Database failure
      security:
        - BearerAuth: []
      tags:
        - Two-Factor Authentication
    delete:
      operationId: delete2faMethod
      summary: Delete 2FA method
      description: Delete a two-factor authentication method. Requires MANAGE_2FA_METHODS access right.
      parameters:
        - name: method-name
          in: path
          required: true
          schema:
            type: string
          description: 2FA method name
      responses:
        '204':
          description: 2FA method deleted successfully
        '400':
          description: Missing method name
        '403':
          description: User does not have MANAGE_2FA_METHODS access right
        '500':
          description: Database failure
      security:
        - BearerAuth: []
      tags:
        - Two-Factor Authentication
components:
  schemas:
    AiObservation:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: Unique observation identifier
        timestamp:
          type: string
          format: date-time
          description: Time the observation was recorded
        instanceId:
          type: integer
          description: ID of the AI operator instance that recorded the observation
        severity:
          type: integer
          description: Severity (0=normal, 1=warning, 2=minor, 3=major, 4=critical)
        title:
          type: string
          nullable: true
          description: Short observation title
        body:
          type: string
          nullable: true
          description: Detailed observation text
        objectId:
          type: integer
          description: ID of the related object (0 if not related to a specific object)
        references:
          type: array
          nullable: true
          items:
            type: string
          description: References supporting the observation (event IDs, alarm IDs, DCI names, etc.)
        state:
          type: string
          enum: [new, acknowledged, dismissed]
          description: Observation triage state
    AiOperator:
      type: object
      properties:
        id:
          type: integer
          description: Unique instance identifier
        name:
          type: string
          description: Instance name
        description:
          type: string
          description: Instance description
        ownerUserId:
          type: integer
          description: ID of the user who created the instance
        enabled:
          type: boolean
          description: True if the instance is enabled
        executing:
          type: boolean
          description: True if an iteration is currently running
        scopeFilter:
          type: string
          description: Attention scope filter (object names or IDs)
        modelSlot:
          type: string
          description: AI model slot used for executions (empty = default)
        minInterval:
          type: integer
          description: Minimum interval between executions in seconds
        maxInterval:
          type: integer
          description: Maximum interval between executions in seconds
        dailyTokenBudget:
          type: integer
          description: Daily LLM token budget (0 = unlimited)
        tokensUsedToday:
          type: integer
          format: int64
          description: LLM tokens used within the current usage day (UTC)
        personaPrompt:
          type: string
          description: Additional persona instructions appended to the system prompt
        currentFocus:
          type: string
          description: Current focus set by the operator itself
        watchList:
          type: string
          description: Watch list maintained by the operator itself
        memento:
          type: string
          description: State carried between iterations by the operator itself
        observationRetentionDays:
          type: integer
          description: Observation retention override in days (0 = server default)
        observationMaxRecords:
          type: integer
          description: Observation record cap override (0 = server default)
        lastExecutionTime:
          type: string
          format: date-time
          description: Time of the last completed execution
        nextExecutionTime:
          type: string
          format: date-time
          description: Scheduled time of the next execution
        iteration:
          type: integer
          description: Number of completed iterations
        consecutiveFailures:
          type: integer
          description: Consecutive failed executions (resets on success and restart)
        lastExplanation:
          type: string
          description: Explanation returned by the last execution
        created:
          type: string
          format: date-time
          description: Instance creation time
        modified:
          type: string
          format: date-time
          description: Last configuration change time
    AiOperatorConfig:
      type: object
      description: >-
        AI operator instance configuration. All fields are optional on update;
        "name" is required on creation. Adaptive state fields (currentFocus,
        watchList, memento) are managed by the operator itself and cannot be
        set through this schema — use the reset-memento endpoint to clear them.
      properties:
        name:
          type: string
          description: Instance name (required on creation)
        description:
          type: string
          description: Instance description
        enabled:
          type: boolean
          description: Enable or disable the instance
        scopeFilter:
          type: string
          description: Attention scope filter
        modelSlot:
          type: string
          description: AI model slot to use (empty = default)
        minInterval:
          type: integer
          description: Minimum interval between executions in seconds (floor 60)
        maxInterval:
          type: integer
          description: Maximum interval between executions in seconds (must be >= minInterval)
        dailyTokenBudget:
          type: integer
          description: Daily LLM token budget (0 = unlimited)
        personaPrompt:
          type: string
          description: Additional persona instructions
        observationRetentionDays:
          type: integer
          description: Observation retention override in days (0 = server default)
        observationMaxRecords:
          type: integer
          description: Observation record cap override (0 = server default)
    AiSavedPrompt:
      type: object
      properties:
        id:
          type: integer
          description: Unique prompt identifier
        name:
          type: string
          description: Display name for the saved prompt
        description:
          type: string
          nullable: true
          description: Optional description
        promptText:
          type: string
          nullable: true
          description: The prompt text
    ChassisPlacement:
      type: object
      description: >-
        Placement geometry of an object within a chassis. Returned both in the
        chassis layout and as the `chassisPlacementConfig` property of a node.
      properties:
        image:
          type: string
          format: uuid
          description: GUID of the image representing the component
        height:
          type: integer
          description: Component height
        heightUnits:
          type: integer
          description: Units for height (0 = rack units, 1 = millimeters)
        width:
          type: integer
          description: Component width
        widthUnits:
          type: integer
          description: Units for width (0 = horizontal pitch, 1 = millimeters)
        positionHeight:
          type: integer
          description: Vertical position of the top-left corner
        positionHeightUnits:
          type: integer
          description: Units for vertical position (0 = rack units, 1 = millimeters)
        positionWidth:
          type: integer
          description: Horizontal position of the top-left corner
        positionWidthUnits:
          type: integer
          description: Units for horizontal position (0 = horizontal pitch, 1 = millimeters)
        orientation:
          type: integer
          description: Orientation (1=front, 2=rear)
    InetAddress:
      type: object
      properties:
        family:
          type: integer
          description: IP address family
        address:
          type: integer
          description: IP address
        prefixLength:
          type: integer
          description: IP address prefix length
    LibraryImage:
      type: object
      properties:
        guid:
          type: string
          format: uuid
          description: Unique image identifier.
        name:
          type: string
          description: Image display name.
        category:
          type: string
          description: Image category.
        mimeType:
          type: string
          description: Image MIME type (e.g. image/png, image/svg+xml).
        isProtected:
          type: boolean
          description: Whether the image is a system-protected image that cannot be modified or deleted.
    GeoArea:
      type: object
      properties:
        id:
          type: integer
          description: Unique geo area identifier.
        name:
          type: string
          description: Geo area name.
        comments:
          type: string
          description: Optional comments.
        border:
          type: array
          description: List of border coordinates defining the area polygon.
          items:
            type: object
            properties:
              latitude:
                type: number
                format: double
                description: Latitude in decimal degrees.
              longitude:
                type: number
                format: double
                description: Longitude in decimal degrees.
    GeoAreaCreateUpdate:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: Geo area name (cannot be empty).
        comments:
          type: string
          description: Optional comments.
        border:
          type: array
          description: List of border coordinates defining the area polygon.
          items:
            type: object
            required:
              - latitude
              - longitude
            properties:
              latitude:
                type: number
                format: double
                description: Latitude in decimal degrees.
              longitude:
                type: number
                format: double
                description: Longitude in decimal degrees.
    MibNode:
      type: object
      description: A node in the SNMP MIB tree, including its immediate children.
      properties:
        oid:
          type: string
          description: Full dotted OID for this node. Empty string for the synthetic root.
        name:
          type: string
          nullable: true
          description: Symbolic name of the node (e.g. `sysDescr`). Null if the node has no name (synthetic root).
        type:
          type: string
          nullable: true
          description: Symbolic name of the MIB type (e.g. `COUNTER32`). Null if the type code is unknown.
          enum:
            - OTHER
            - IMPORT_ITEM
            - OBJID
            - BITSTRING
            - INTEGER
            - INTEGER32
            - INTEGER64
            - UNSIGNED32
            - COUNTER
            - COUNTER32
            - COUNTER64
            - GAUGE
            - GAUGE32
            - TIMETICKS
            - OCTETSTR
            - OPAQUE
            - IPADDR
            - PHYSADDR
            - NETADDR
            - NAMED_TYPE
            - SEQID
            - SEQUENCE
            - CHOICE
            - TEXTUAL_CONVENTION
            - MACRO_DEFINITION
            - MODCOMP
            - TRAPTYPE
            - NOTIFTYPE
            - MODID
            - NSAPADDRESS
            - AGENTCAP
            - UINTEGER
            - "NULL"
            - OBJGROUP
            - NOTIFGROUP
        typeCode:
          type: integer
          description: Numeric MIB type code as defined in `nxsnmp.h` (MIB_TYPE_*).
        status:
          type: string
          nullable: true
          description: Symbolic name of the MIB status. Null if the status code is unknown.
          enum:
            - MANDATORY
            - OPTIONAL
            - OBSOLETE
            - DEPRECATED
            - CURRENT
        statusCode:
          type: integer
          description: Numeric MIB status code as defined in `nxsnmp.h` (MIB_STATUS_*).
        access:
          type: string
          nullable: true
          description: Symbolic name of the MIB access mode. Null if the access code is unknown.
          enum:
            - READONLY
            - READWRITE
            - WRITEONLY
            - NOACCESS
            - NOTIFY
            - CREATE
        accessCode:
          type: integer
          description: Numeric MIB access code as defined in `nxsnmp.h` (MIB_ACCESS_*).
        description:
          type: string
          nullable: true
          description: DESCRIPTION clause from the MIB module.
        textualConvention:
          type: string
          nullable: true
          description: Name of the textual convention applied to this object, if any.
        displayHint:
          type: string
          nullable: true
          description: DISPLAY-HINT clause for formatting raw values.
        enumValues:
          type: string
          nullable: true
          description: Comma-separated list of named enumeration values, if defined.
        index:
          type: string
          nullable: true
          description: INDEX clause for SMIv2 table entries.
        parent:
          type: string
          nullable: true
          description: Full dotted OID of the parent node. Null for the synthetic root.
        children:
          type: array
          description: Immediate child nodes (one level deep).
          items:
            $ref: '#/components/schemas/MibNodeChild'
    MibNodeChild:
      type: object
      description: Summary of a child node, used inside `MibNode.children`. Fetch `/v1/snmp-mib/{oid}` to retrieve full details.
      properties:
        subId:
          type: integer
          description: Sub-identifier under the parent (last component of the child's OID).
        oid:
          type: string
          description: Full dotted OID of the child node.
        name:
          type: string
          nullable: true
          description: Symbolic name of the child node, if defined.
        hasChildren:
          type: boolean
          description: True if this child has further descendants.
    ObjectCategory:
      type: object
      properties:
        id:
          type: integer
          description: Unique object category identifier.
        name:
          type: string
          description: Object category name.
        icon:
          type: string
          format: uuid
          description: UUID of the icon image from the image library.
        mapImage:
          type: string
          format: uuid
          description: UUID of the map image from the image library.
    ObjectCategoryCreateUpdate:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: Object category name (cannot be empty).
        icon:
          type: string
          format: uuid
          description: UUID of the icon image from the image library.
        mapImage:
          type: string
          format: uuid
          description: UUID of the map image from the image library.
    ScheduledTask:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: Unique task identifier
        taskHandlerId:
          type: string
          description: Task handler identifier
        schedule:
          type: string
          description: Cron-style schedule expression (for recurrent tasks)
        parameters:
          type: string
          description: Task-specific persistent data
        scheduledExecutionTime:
          type: string
          format: date-time
          nullable: true
          description: Scheduled execution time in ISO 8601 format, or null if not set
        lastExecutionTime:
          type: string
          format: date-time
          nullable: true
          description: Last execution time in ISO 8601 format, or null if never executed
        recurrent:
          type: boolean
          description: Whether this is a recurrent (cron-based) task
        disabled:
          type: boolean
          description: Whether the task is disabled
        completed:
          type: boolean
          description: Whether the task has completed
        running:
          type: boolean
          description: Whether the task is currently running
        system:
          type: boolean
          description: Whether this is a system task
        userId:
          type: integer
          description: Owner user ID
        objectId:
          type: integer
          description: Associated NetXMS object ID
        comments:
          type: string
          description: Task comments
        taskKey:
          type: string
          description: Optional task key for identification
    ScheduledTaskCreateUpdate:
      type: object
      required:
        - taskHandlerId
      properties:
        taskHandlerId:
          type: string
          description: Task handler identifier
        schedule:
          type: string
          description: Cron-style schedule expression (for recurrent tasks)
        executionTime:
          oneOf:
            - type: integer
              format: int64
            - type: string
              format: date-time
          description: Execution time for one-time tasks. Accepts Unix timestamp (integer) or ISO 8601 string.
        parameters:
          type: string
          description: Task-specific persistent data
        objectId:
          type: integer
          description: Associated NetXMS object ID
        comments:
          type: string
          description: Task comments
        taskKey:
          type: string
          description: Optional task key for identification
        disabled:
          type: boolean
          description: Whether the task should be disabled
    NotificationChannel:
      type: object
      properties:
        name:
          type: string
          description: Channel name
        description:
          type: string
          description: Channel description
        driverName:
          type: string
          description: Notification driver name
        configuration:
          type: string
          description: Driver-specific configuration
        driverInitialized:
          type: boolean
          description: Whether the driver was initialized successfully
        needSubject:
          type: boolean
          description: Whether the driver requires a subject field
        needRecipient:
          type: boolean
          description: Whether the driver requires a recipient field
        errorMessage:
          type: string
          description: Last error message
        sendStatus:
          type: integer
          description: Last send status code
        healthCheckStatus:
          type: boolean
          description: Health check status
        lastMessageTime:
          type: string
          description: Timestamp of last sent message
        messageCount:
          type: integer
          description: Total messages sent
        failureCount:
          type: integer
          description: Total send failures
        digestedCount:
          type: integer
          description: Total messages absorbed into digest
        queueSize:
          type: integer
          description: Current message queue size
    LogParser:
      type: object
      properties:
        type:
          type: string
          description: Log parser type
          enum:
            - syslog
            - windows-event
            - opentelemetry
        content:
          type: string
          description: Parser configuration as an XML document (empty string if no rules are configured)
    EventForwarder:
      type: object
      properties:
        name:
          type: string
          description: Event forwarder name
        description:
          type: string
          description: Event forwarder description
        driverName:
          type: string
          description: Event forwarder driver name
        configuration:
          type: object
          additionalProperties: true
          description: Driver-specific configuration object
        driverInitialized:
          type: boolean
          description: Whether the driver was initialized successfully
        errorMessage:
          type: string
          description: Last error message
        sendStatus:
          type: integer
          description: Last delivery status code
        healthCheckStatus:
          type: boolean
          description: Health check status
        lastMessageTime:
          type: string
          description: Timestamp of last forwarded event
        messageCount:
          type: integer
          description: Total events forwarded
        failureCount:
          type: integer
          description: Total delivery failures
        droppedCount:
          type: integer
          description: Total events dropped
        queueSize:
