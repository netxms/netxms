          required: true
          schema:
            type: integer
          description: Rack object ID
        - name: element-id
          in: path
          required: true
          schema:
            type: integer
          description: Passive element ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RackPassiveElement'
      responses:
        '200':
          description: Passive element updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RackPassiveElement'
        '400':
          description: Invalid request body, object ID, or object is not a rack
        '401':
          description: Unauthorized
        '403':
          description: User does not have modify access to given object
        '404':
          description: Object or passive element with given ID does not exist
      security:
        - BearerAuth: []
      tags:
        - Objects
    delete:
      operationId: deleteRackPassiveElement
      summary: Delete rack passive element
      description: >-
        Remove a passive element from a rack. Removing a patch panel also drops
        its physical link inventory. Requires MODIFY access to the rack object.
      parameters:
        - name: object-id
          in: path
          required: true
          schema:
            type: integer
          description: Rack object ID
        - name: element-id
          in: path
          required: true
          schema:
            type: integer
          description: Passive element ID
      responses:
        '204':
          description: Passive element deleted
        '400':
          description: Invalid object ID or object is not a rack
        '401':
          description: Unauthorized
        '403':
          description: User does not have modify access to given object
        '404':
          description: Object or passive element with given ID does not exist
      security:
        - BearerAuth: []
      tags:
        - Objects
  /v1/objects/{object-id}/sub-tree:
    get:
      operationId: getObjectSubTree
      summary: Get object sub-tree
      description: Retrieve a recursively nested sub-tree of objects starting from the specified parent object. Each node carries its accessible children under a `children` property.
      parameters:
        - name: object-id
          in: path
          required: true
          schema:
            type: integer
            description: Parent object ID
        - name: class
          in: query
          schema:
            type: string
            description: Optional comma-separated list of object class names. If provided, only objects of the listed classes (and ancestors that lead to them) are returned. Unknown class names are ignored.
        - name: maxDepth
          in: query
          schema:
            type: integer
            default: 10
            maximum: 100
            description: Maximum tree depth to traverse. Values above 100 are capped at 100.
      responses:
        '200':
          description: Object sub-tree retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ObjectTreeNode'
        '401':
          description: Unauthorized
        '403':
          description: User does not have read access to given object
        '404':
          description: Object with given ID does not exist
      security:
        - BearerAuth: []
      tags:
        - Objects
  /v1/objects/{object-id}/object-tools:
    get:
      operationId: listObjectToolsForObject
      summary: List object tools applicable to an object
      description: Retrieve a list of object tools that are applicable to the specified object, filtered by tool ACL, container context, disabled status, and the tool's menu filter (SNMP/agent requirements, OID match, OS match, template match, custom attribute match).
      parameters:
        - name: object-id
          in: path
          required: true
          schema:
            type: integer
          description: Object ID to filter tools for
        - name: types
          in: query
          required: false
          schema:
            type: string
          description: Comma-separated list of tool types to filter by. Uses kebab-case format (e.g., "action,server-script,ssh-command")
      responses:
        '200':
          description: Successful retrieval of applicable object tools.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ObjectToolSummary'
        '400':
          description: Invalid object ID.
        '403':
          description: User does not have read access to the object.
        '404':
          description: Object with given ID does not exist.
        '500':
          description: Database failure.
      security:
        - BearerAuth: []
      tags:
        - Object Tools
  /v1/objects/query:
    post:
      operationId: queryObjects
      summary: Execute object query
      description: Execute object query (specialized NXSL script) and return all matching objects along with additional data fields.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - query
              properties:
                fields:
                  type: array
                  description: List of additional fields to be retrieved.
                  items:
                    type: string
                inputFields:
                  type: object
                  additionalProperties:
                    type: string
                  description: Map of user input fields (available in query script via global variable $INPUT). Keys are input field names, values are user-provided values.
                limit:
                  type: integer
                  description: Optional limit on number of retrieved objects. Limit is applied after ordering.
                orderBy:
                  type: array
                  description: List of object attributes to be used for ordering result.
                  items:
                    type: string
                query:
                  type: string
                  description: Object query script
                  example: type == NODE
                rootObjectId:
                  type: integer
                  description: Optional root object ID to scope the query to a sub-tree. 0 (default) queries all objects.
                readAllFields:
                  type: boolean
                  description: If true, all object fields are made available to the query script (default false).
      responses:
        '200':
          description: Query successfully executed.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ObjectQueryResult'
        '401':
          description: Unauthorized.
      security:
        - BearerAuth: []
      tags:
        - Objects
  /v1/objects/search:
    post:
      operationId: searchObjects
      summary: Search objects
      description: Search for objects matching certain criteria. Multiple criterias will be combined with logical AND.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                class:
                  type: array
                  items:
                    $ref: '#/components/schemas/ObjectClass'
                ipAddress:
                  type: string
                  format: ip-address
                  description: IP address filter string. If provided, only objects with matching primary IP address will be returned.
                name:
                  type: string
                  description: Name filter string. If provided, only objects with name or alias containing given string will be returned.
                parent:
                  type: integer
                  description: Parent object ID. If provided, only child objects (both direct and indirect) of given parent object will be returned.
                zoneUIN:
                  type: integer
                  description: Zone UIN. If provided, only objects within given zone will be returned.
      responses:
        '200':
          description: Successful retrieval of objects.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ObjectSummary'
        '401':
          description: Unauthorized.
      security:
        - BearerAuth: []
      tags:
        - Objects
