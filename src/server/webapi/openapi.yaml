  /v1/objects/{object-id}/remote-control:
    post:
      operationId: createRemoteControlSession
      summary: Create Remote Control Session
      description: |
        Create a remote control (VNC) session for a node and return a short-lived token
        for WebSocket connection. This is a convenience endpoint that automatically
        determines VNC connection parameters based on the node's configuration.

        The endpoint uses the node's configured VNC port and proxy settings to establish
        a TCP tunnel. The returned token should be used to connect to the WebSocket
        endpoint `/v1/tcp-proxy/{token}`.

        **Two-Phase Authorization Flow:**
        1. Call this endpoint with Bearer token authentication
        2. Server establishes VNC tunnel via agent and returns a session token
        3. Connect to `/v1/tcp-proxy/{token}` WebSocket endpoint (no auth header needed)

        **Required Permissions:**
        - System access right: SYSTEM_ACCESS_SETUP_TCP_PROXY
        - Object access rights: OBJECT_ACCESS_READ and OBJECT_ACCESS_CONTROL on the node
      tags:
        - Objects
        - TCP Proxy
      parameters:
        - name: object-id
          in: path
          required: true
          schema:
            type: integer
          description: Node object ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                allowControlMessages:
                  type: boolean
                  description: If true, server will send JSON control messages in text frames (default is false)
      responses:
        '201':
          description: Remote control session created successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    format: uuid
                    description: Session token for WebSocket connection
                  expiresIn:
                    type: integer
                    description: Token validity period in seconds
                  wsUrl:
                    type: string
                    description: WebSocket URL path to connect to
              example:
                token: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                expiresIn: 30
                wsUrl: "/v1/tcp-proxy/a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        '400':
          description: |
            Bad Request - Object is not a node or VNC port not configured.
        '401':
          description: Unauthorized - Authentication token missing or invalid
        '403':
          description: |
            Forbidden - User does not have required permissions.
            Either SYSTEM_ACCESS_SETUP_TCP_PROXY, OBJECT_ACCESS_READ, or OBJECT_ACCESS_CONTROL is missing.
        '404':
          description: Object not found - Invalid object ID
        '502':
          description: |
            Bad Gateway - Cannot establish connection to agent.
            Agent may be unreachable or TCP proxy setup failed.
        '503':
          description: Service Unavailable - No proxy node available
      security:
        - BearerAuth: []

  /v1/objects/{object-id}/set-maintenance:
    post:
      operationId: setObjectMaintenance
      summary: Make object enter or leave maintenance mode, immediately or on schedule
      description: |
        Without time fields, immediately changes object maintenance state according to the "maintenance" field.
        If "startTime" and/or "endTime" is provided, maintenance is scheduled instead by creating one-time
        scheduled tasks (visible in scheduled task list and cancellable via the scheduled tasks API):
          * startTime + endTime - schedule maintenance window (enter at startTime, leave at endTime);
          * startTime only - schedule maintenance entry, leave manually;
          * endTime only - schedule maintenance exit; combined with "maintenance": true the object
            enters maintenance immediately and leaves at endTime.
        Scheduling requires the "schedule object maintenance" system access right.
      parameters:
        - name: object-id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                maintenance:
                  type: boolean
                  description: true - if object should enter maintenance mode, false - if leave (ignored if startTime is provided)
                comments:
                  type: string
                  description: Optional maintenance comments (also set on created scheduled tasks)
                startTime:
                  oneOf:
                    - type: integer
                    - type: string
                  description: Scheduled maintenance start time - UNIX timestamp, ISO 8601 string, or relative time ("+30m", "now")
                endTime:
                  oneOf:
                    - type: integer
                    - type: string
                  description: Scheduled maintenance end time - UNIX timestamp, ISO 8601 string, or relative time ("+2h")
      responses:
        '204':
          description: Maintenance mode changed or scheduled successfully
        '400':
          description: Invalid arguments
        '401':
          description: Unauthorized
        '403':
          description: User does not have control access to given object or scheduling rights
        '404':
          description: Object with given ID does not exist
      security:
        - BearerAuth: []
      tags:
        - Objects
