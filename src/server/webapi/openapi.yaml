                items:
                  type: object
                  properties:
                    localMacAddress:
                      type: string
                      description: Local mac address
                    localNodeId:
                      type: integer
                      description: Local node id
                    localInterfaceId:
                      type: integer
                      description: Local interface ID
                    localIpAddress:
