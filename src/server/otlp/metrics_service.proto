syntax = "proto3";

package opentelemetry.proto.collector.metrics.v1;

option java_multiple_files = true;
option java_package = "io.opentelemetry.proto.collector.metrics.v1";
option java_outer_classname = "MetricsServiceProto";

import "metrics.proto";

// Service that can be used to push metrics between one pair of client/server.
service MetricsService {
  // For performance reasons, it is recommended to keep this RPC
  // temporary and persistent. Batch operations are recommended for
  // export.
  rpc Export(ExportMetricsServiceRequest) returns (ExportMetricsServiceResponse) {}
}

message ExportMetricsServiceRequest {
  // An array of ResourceMetrics.
  // For data coming from a single resource this array will typically contain one
  // element. Intermediary nodes (such as OpenTelemetry Collector) that receive
  // data from multiple origins typically batch the data before forwarding further and
  // in that case this array will contain multiple elements.
  repeated opentelemetry.proto.metrics.v1.ResourceMetrics resource_metrics = 1;
}

message ExportMetricsServiceResponse {
  // The details of a partially successful export request.
  ExportMetricsPartialSuccess partial_success = 1;
}

// ExportMetricsPartialSuccess is used when some metrics were rejected.
message ExportMetricsPartialSuccess {
  // The number of rejected data points.
  int64 rejected_data_points = 1;

  // A developer-facing human-readable message in English. It MUST NOT exceed
  // 512 bytes.
  string error_message = 2;
}
